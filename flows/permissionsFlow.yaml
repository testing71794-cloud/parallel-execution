appId: com.kodaksmile
---
# Android runtime permission dialogs (best-effort; literal labels for subflow safety)
- runFlow:
    when:
      visible: "Photos Access Required"
    commands:
      - tapOn:
          text: "Ok"
          optional: true
      - tapOn:
          text: "OK"
          optional: true
      - waitForAnimationToEnd

- runFlow:
    when:
      visible: "Enable photos access"
    commands:
      - tapOn: "Enable photos access"
      - waitForAnimationToEnd

- runFlow:
    when:
      visible: "Allow KODAK SMILE to find"
    commands:
      - tapOn:
          text: "Allow"
          optional: true
      - waitForAnimationToEnd

- runFlow:
    when:
      visible: "While using the app"
    commands:
      - tapOn: "While using the app"
      - waitForAnimationToEnd

- runFlow:
    when:
      visible: "ONLY THIS TIME"
    commands:
      - tapOn:
          text: "WHILE USING THE APP"
          optional: true
      - waitForAnimationToEnd

- runFlow:
    when:
      visible: "Only this time"
    commands:
      - tapOn:
          text: "While using the app"
          optional: true
      - waitForAnimationToEnd

- runFlow:
    when:
      visible: "Allow"
    commands:
      - tapOn: "Allow"
      - waitForAnimationToEnd
