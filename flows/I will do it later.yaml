appId: com.kodaksmile
name: Signup Flow
---
- waitForAnimationToEnd

# ------------------------------
# Signup Screen: Assert all elements + tap "I'll do it later"
# ------------------------------
- waitForAnimationToEnd

# Screen title
- assertVisible: "Sign Up"

# Input fields
- assertVisible: "Full Name"
- assertVisible: "Email"
- assertVisible: "Password"

# Terms text + links
- assertVisible: "By signing up you agree to our"
- assertVisible: "Terms & Conditions and  "
- assertVisible: "Privacy Policy."
# Primary CTA
- assertVisible: "Create Account"

# Footer actions (optional — layout varies by build/locale)
- assertVisible:
    text: "Already have an account?"
    optional: true
- assertVisible:
    text: "Log In"
    optional: true

# Tap skip
- tapOn: "I'll do it later"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Terms and Conditions"
    timeout: 20000
