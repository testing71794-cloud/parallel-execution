# Signup (flow1b) — do not hardcode test users.
# Parallel runs: `run_one_flow_on_device` generates EMAIL / FULL_NAME / PASSWORD and passes:
#   maestro test -e EMAIL=... -e FULL_NAME=... -e PASSWORD=... this.yaml --device <serial>
# Local: maestro test -e EMAIL=u@example.com -e FULL_NAME=KodakT1 -e PASSWORD=KodakT1a! flow1b.yaml --device <serial>
#        Or run: scripts\run_flow1b_local.bat [<device_serial>] (generates EMAIL/FULL_NAME/PASSWORD; avoids "undefined" in fields)
# JSON: reports/signup_users/<device>_signup_user.json (per device, not shared).
appId: com.kodaksmile
name: Signup Flow
env:
  FULL_NAME: ${FULL_NAME}
  EMAIL: ${EMAIL}
  PASSWORD: ${PASSWORD}
---
- waitForAnimationToEnd

- assertVisible: "Sign Up"

- tapOn: "Full Name"
- inputText: ${FULL_NAME}
- waitForAnimationToEnd

- tapOn: "Email"
- inputText: ${EMAIL}
- waitForAnimationToEnd

- tapOn: "Password"
- inputText: ${PASSWORD}
- waitForAnimationToEnd

- hideKeyboard:
    optional: true
- waitForAnimationToEnd

# Register / continue (app-specific dialog text may differ after duplicate errors — pre-check in runner log)
- tapOn: "Create Account"
- waitForAnimationToEnd