appId: com.kodaksmile
name: Flow4 - Login + Onboarding + Home
---
- launchApp:
    clearState: true
- waitForAnimationToEnd

# Load elements (POM)
- runFlow: ../elements/loadElements.yaml

# ----------- LOGIN -----------
# If Login button exists on landing, open login screen
- runFlow:
    when:
      visible: "Log In"
    commands:
      - tapOn: "Log In"
      - waitForAnimationToEnd

- runFlow:
    when:
      visible: "No, thanks"
    commands:
      - tapOn: "No, thanks"
      - waitForAnimationToEnd
# Enter email
- tapOn: "Email"
- inputText: "Automation47@yopmail.com"
- runFlow:
    when:
      visible: "No, thanks"
    commands:
      - tapOn: "No, thanks"
      - waitForAnimationToEnd
- runFlow:
    when:
      notVisible: "Automation47@yopmail.com"
    commands:
      - tapOn: "Email"
      - inputText: "Automation47@yopmail.com"
# Enter wrong password + verify error
- tapOn: "Password"
- inputText: "WrongPass123"
- hideKeyboard:
    optional: true
- tapOn: "Login"
- waitForAnimationToEnd
- runFlow:
    when:
      visible: "You have entered an invalid email id or password"
    commands:
      - tapOn: "Ok"
      - waitForAnimationToEnd

# Enter correct password + login
- tapOn: "Password"
- eraseText
- inputText: "Test12345"
- hideKeyboard:
    optional: true
- tapOn: "Login"
- waitForAnimationToEnd

# ----------- PERMISSIONS + ONBOARDING -----------
- runFlow: ../flows/permissionsFlow.yaml
- runFlow: ../flows/onboardingSkip.yaml
- runFlow: ../flows/handleRateApp.yaml

# ----------- HOME -----------
- assertVisible: "KODAK SMILE"

