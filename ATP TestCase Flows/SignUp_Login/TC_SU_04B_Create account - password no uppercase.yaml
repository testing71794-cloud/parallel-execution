appId: com.kodaksmile
name: TC_SU_04B_Create account - password no uppercase
---
- launchApp:
    clearState: true
- waitForAnimationToEnd

# Load shared identifiers. This file must exist in ../../elements.
- runFlow: ../../elements/loadElements.yaml

# Sign-up validation starts on Sign Up screen
- assertVisible: "Sign Up"

# ATP steps for traceability: SU_04B - Create account - password no uppercase
# Step 1: action=launchApp; target=None; input=None; expected=App launches successfully
- waitForAnimationToEnd

# Step 2: action=tapOn; target=Password; input=None; expected=Cursor appears in Password field
- tapOn: "Password"
- waitForAnimationToEnd

# Step 3: action=inputText; target=Password; input=password123; expected=Password is entered
- tapOn: "Password"
- inputText: "password123"
- waitForAnimationToEnd
- hideKeyboard

# Step 4: action=tapOn; target=Create Account; input=None; expected=Error: 'Password must include 1 uppercase letter'
- tapOn: "Create Account"
- assertVisible: "Password must include 1 uppercase letter"


