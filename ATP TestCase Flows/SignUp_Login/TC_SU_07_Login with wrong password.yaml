appId: com.kodaksmile
name: TC_SU_07_Login with wrong password
---
- launchApp:
    clearState: true
- waitForAnimationToEnd

# Load shared identifiers. This file must exist in ../../elements.
- runFlow: ../../elements/loadElements.yaml

# Navigate to login/forgot password area from signup screen
- assertVisible: "Sign Up"
- tapOn: "Log In"
- waitForAnimationToEnd

# ATP steps for traceability: SU_07 - Login with wrong password
# Step 1: action=launchApp; target=None; input=None; expected=App launches successfully
- waitForAnimationToEnd

# Step 2: action=tapOn; target=Log in; input=None; expected=Login screen appears
- tapOn: "Log in"
- waitForAnimationToEnd

# Step 3: action=tapOn; target=Email; input=None; expected=Cursor appears in Email field
- tapOn: "Email"
- waitForAnimationToEnd

# Step 4: action=inputText; target=Email; input=existinguser@email.com; expected=Email is entered
- tapOn: "Email"
- inputText: "automation8@test.com"
- waitForAnimationToEnd

# Step 5: action=tapOn; target=Password; input=None; expected=Cursor appears in Password field
- tapOn: "Password"
- waitForAnimationToEnd

# Step 6: action=inputText; target=Password; input=WrongPassword123; expected=Password is entered
- tapOn: "Password"
- inputText: "WrongPassword123"
- waitForAnimationToEnd
- hideKeyboard

# Step 7: action=tapOn; target=Log in; input=None; expected=Pop-up: 'Invalid email or password'
- tapOn: "Login"
- waitForAnimationToEnd
- assertVisible: "Invalid email or password"
# Step 8: action=tapOn; target=OK; input=None; expected=Pop-up dismissed, login screen shown
- tapOn: "OK"
- waitForAnimationToEnd
- assertVisible: "automation8@test.com"

