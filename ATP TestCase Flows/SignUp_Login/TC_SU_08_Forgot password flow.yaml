appId: com.kodaksmile
name: TC_SU_08_Forgot password flow
---
- launchApp:
    clearState: true
- waitForAnimationToEnd

# Load shared identifiers. This file must exist in ../../elements.
- runFlow: ../../elements/loadElements.yaml

# Navigate to login/forgot password area from signup screen
- assertVisible: "Sign Up"
- tapOn: "Log In"
- waitForAnimationToEnd

# ATP steps for traceability: SU_08 - Forgot password flow
# Step 1: action=launchApp; target=None; input=None; expected=App launches successfully
- waitForAnimationToEnd

# Step 2: action=tapOn; target=Log in; input=None; expected=Login screen appears
- tapOn: "Log in"
- waitForAnimationToEnd

# Step 3: action=tapOn; target=Forgot password; input=None; expected=Forgot password screen appears
- tapOn: "Forgot password"
- waitForAnimationToEnd

# Step 4: action=tapOn; target=Email; input=None; expected=Cursor appears in Email field
- tapOn: "Email"
- waitForAnimationToEnd

# Step 5: action=inputText; target=Email; input=existinguser@email.com; expected=Email is entered
- tapOn: "Email"
- inputText: "automation8@yopmail.com"
- waitForAnimationToEnd
- hideKeyboard
# Step 6: action=tapOn; target=Send; input=None; expected=Reset email sent confirmation
- tapOn: "Send"
- waitForAnimationToEnd
- assertVisible: "Check\nYour Inbox"
- assertVisible: "If this email address exists, you will get a password recovery link shortly."
- waitForAnimationToEnd
# Step 7: action=tapOn; target=Done; input=None; expected=Returns to login screen
- tapOn: "Done"
- waitForAnimationToEnd

# Step 8: action= Back on login after successfull forgot Password
- assertVisible: "Log In"
- scrollUntilVisible:
    element: "Login"


