appId: com.kodaksmile
name: TC_SU_04_Create account - password too short
---
- launchApp:
    clearState: true
- waitForAnimationToEnd

# Load shared identifiers. This file must exist in ../../elements.
- runFlow: ../../elements/loadElements.yaml

# Sign-up validation starts on Sign Up screen
- assertVisible: "Sign Up"

# ATP steps for traceability: SU_04 - Create account - password too short
# Step 1: action=launchApp; target=None; input=None; expected=App launches successfully
- waitForAnimationToEnd

# Step 2: action=fillForm; target=Name, Email; input=Test User, test@email.com; expected=Form fields populated
# TODO: Map ATP action 'fillForm' if this step is not already covered by reusable flows.

# Step 3: action=tapOn; target=Password; input=None; expected=Cursor appears in Password field
- tapOn: "Password"
- waitForAnimationToEnd

# Step 4: action=inputText; target=Password; input=Pass1; expected=Password is entered
- tapOn: "Password"
- inputText: "Pass1"
- waitForAnimationToEnd
- hideKeyboard

# Step 5: action=tapOn; target=Create Account; input=None; expected=Error: 'Password must be at least 8 characters'
- tapOn: "Create Account"
- waitForAnimationToEnd
- assertVisible: "Password must include: At least 8 characters"


