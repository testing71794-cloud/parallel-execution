appId: com.kodaksmile
name: TC_SU_06_Login with valid credentials
---
- launchApp:
    clearState: true
- waitForAnimationToEnd

# Load shared identifiers. This file must exist in ../../elements.
- runFlow: ../../elements/loadElements.yaml

# Navigate to login/forgot password area from signup screen
- assertVisible: "Sign Up"
- tapOn: "Log In"
- waitForAnimationToEnd

# ATP steps for traceability: SU_06 - Login with valid credentials
# Step 1: action=launchApp; target=None; input=None; expected=App launches successfully
- waitForAnimationToEnd

# Step 2: action=tapOn; target=Log in; input=None; expected=Login screen appears
- tapOn: "Log in"
- waitForAnimationToEnd

# Step 3: action=tapOn; target=Email; input=None; expected=Cursor appears in Email field
- tapOn: "Email"
- waitForAnimationToEnd

# Step 4: action=inputText; target=Email; input=existinguser@email.com; expected=Email is entered
- tapOn: "Email"
- inputText: "automation8@yopmail.com"
- waitForAnimationToEnd

# Step 5: action=tapOn; target=Password; input=None; expected=Cursor appears in Password field
- tapOn: "Password"
- waitForAnimationToEnd
# Step 6: action=inputText; target=Password; input=Password123; expected=Password is entered
- tapOn: "Password"
- inputText: "Test12345"
- waitForAnimationToEnd
- hideKeyboard
# Step 7: action=tapOn; target=Log in; input=None; expected=Login initiated
- tapOn: "Login"
- waitForAnimationToEnd

- runFlow:
    when:
      visible: "Photos Access Required"
    commands:
      - tapOn:
          id: buttonErrorOk
      - waitForAnimationToEnd

- runFlow:
    when:
      visible:
        id: permission_allow_foreground_only_button
    commands:
      - tapOn:
          id: permission_allow_foreground_only_button
      - waitForAnimationToEnd

- runFlow:
    when:
      visible:
        id: permission_allow_button
    commands:
      - tapOn:
          id: permission_allow_button
      - waitForAnimationToEnd
      - tapOn:
          id: permission_allow_button
      - waitForAnimationToEnd
- assertVisible: "Swipe to continue"
