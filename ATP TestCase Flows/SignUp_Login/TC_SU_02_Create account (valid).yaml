appId: com.kodaksmile
name: TC_SU_02_Create account (valid)
# Defaults apply in Maestro Studio/IDE; CLI/CI can override with -e (e.g. run_one_flow / run_flow1b_local).
# PASSWORD default uses fromCharCode(35) so the YAML file does not treat # as a comment.
env:
  FULL_NAME: ${FULL_NAME || "Nitesh"}
  EMAIL: ${EMAIL || "kodak_" + String(Date.now()) + "_" + String(Math.floor(Math.random() * 1000000000)) + "@test.com"}
  PASSWORD: ${PASSWORD || "252546Nm" + String.fromCharCode(35)}
---
- launchApp:
    clearState: true
- waitForAnimationToEnd

# Load shared identifiers. This file must exist in ../../elements.
- runFlow: ../../elements/loadElements.yaml

# Sign-up validation starts on Sign Up screen
- assertVisible: "Sign Up"

# ATP steps for traceability: SU_02 - Create account (valid)
# Step 1: action=launchApp; target=None; input=None; expected=App launches successfully
- waitForAnimationToEnd

# Step 2: action=tapOn; target=Full Name; input=None; expected=Cursor appears in Full Name field
- tapOn: "Full Name"
- waitForAnimationToEnd

# Step 3: action=inputText; target=Full Name; input=Test User; expected=Name is entered
- tapOn: "Full Name"
- inputText: "${FULL_NAME}"
- waitForAnimationToEnd

# Step 4: action=tapOn; target=Email; input=None; expected=Cursor appears in Email field
- tapOn: "Email"
- inputText: "${EMAIL}"
- waitForAnimationToEnd
- hideKeyboard:
    optional: true

# Step 7: action=inputText; target=Password; input=Password123; expected=Password is entered (masked)
- tapOn: "Password"
- inputText: "Password123"
- hideKeyboard:
    optional: true
- waitForAnimationToEnd

# Step 8: action=tapOn; target=Date of birth; input=None; expected=Date picker opens
- tapOn: "Date of birth"

# Year selection
- tapOn: "2026"
- scrollUntilVisible:
    element: "1996"
    direction: UP
- tapOn: "1996"

# Confirm DOB
- tapOn: "OK"

# Step 10: action=tapOn; target=Terms & Conditions checkbox; input=None; expected=Checkbox is selected
# Terms & Create Account
- tapOn:
    id: checkboxTermsCondition
# Step 11: action=tapOn; target=Create Account; input=None; expected=Account creation initiated
- tapOn: "Create Account"
- waitForAnimationToEnd
- waitForAnimationToEnd
- runFlow:
    when:
      visible: "Photos Access Required"
    commands:
      - tapOn:
          id: buttonErrorOk
      - waitForAnimationToEnd

- runFlow:
    when:
      visible:
        id: permission_allow_foreground_only_button
    commands:
      - tapOn:
          id: permission_allow_foreground_only_button
      - waitForAnimationToEnd

- runFlow:
    when:
      visible:
        id: permission_allow_button
    commands:
      - tapOn:
          id: permission_allow_button
      - waitForAnimationToEnd
      - tapOn:
          id: permission_allow_button
      - waitForAnimationToEnd
- assertVisible: "Swipe to continue"


