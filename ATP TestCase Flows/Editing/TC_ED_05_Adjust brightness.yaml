# TC_ID: TC_ED_05 - Adjust brightness with AI verification
appId: com.kodaksmile
name: TC_ED_05_Adjust_brightness
---
- runFlow:
    file: subflows/prepare_editor_cold_start.yaml
    env:
      SCREENSHOT_BASENAME: TC_ED_05_editor_ready
      SCREEN_LABEL: TC_ED_05 editor before Adjust brightness

- takeScreenshot: TC_ED_05_brightness_before
- runFlow: subflows/apply_brightness.yaml
- takeScreenshot: TC_ED_05_brightness_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: TC_ED_05_brightness_before
      AFTER_BASENAME: TC_ED_05_brightness_after
      VERIFY_LABEL: TC_ED_05 Adjust brightness
      VERIFY_PROFILE: brightness

- runFlow: subflows/save_changes.yaml
