appId: com.kodaksmile
name: TC_ED_03_Edit photo fit crop
---
- launchApp:
    clearState: true
- waitForAnimationToEnd

# Load shared identifiers. This file must exist in ../../elements.
- runFlow: ../../elements/loadElements.yaml

# Common setup: skip account creation and reach onboarding/home path
- runFlow: ../../flows/I will do it later.yaml
- runFlow: ../../flows/Agree Term and Condition.yaml
- runFlow: ../../flows/Onboarding Welcome Screen.yaml
- runFlow: ../../flows/Swipe to continue.yaml
- runFlow: ../../flows/permissionsFlow.yaml

- runFlow: ../../flows/openAlbum.yaml
- runFlow: ../../flows/Edit.yaml

# ATP steps for traceability: ED_03 - Edit photo fit/crop
# Step 1: action=executeTestCase; target=ED_01; input=None; expected=Edit mode active
# TODO: Map ATP action 'executeTestCase' if this step is not already covered by reusable flows.

# Step 2: action=tapOn; target=Fit; input=None; expected=Fit tool selected
- tapOn: "Fit"
- waitForAnimationToEnd

# Step 3: action=pinchZoom; target=Photo canvas; input=Zoom in; expected=Photo zooms in
# TODO: Map ATP action 'pinchZoom' if this step is not already covered by reusable flows.

# Step 4: action=pinchZoom; target=Photo canvas; input=Zoom out; expected=Photo zooms out
# TODO: Map ATP action 'pinchZoom' if this step is not already covered by reusable flows.

# Step 5: action=drag; target=Photo canvas; input=Move position; expected=Photo position adjusted
# TODO: Map ATP action 'drag' if this step is not already covered by reusable flows.

# Step 6: action=tapOn; target=Save; input=None; expected=Fit changes saved
- tapOn: "Save"
- waitForAnimationToEnd

