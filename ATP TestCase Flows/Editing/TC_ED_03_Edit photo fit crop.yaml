# TC_ID: TC_ED_03 - Edit photo fit crop with AI verification
appId: com.kodaksmile
name: TC_ED_03_Edit_photo_fit_crop
---
- runFlow:
    file: subflows/prepare_editor_cold_start.yaml
    env:
      SCREENSHOT_BASENAME: TC_ED_03_editor_ready
      SCREEN_LABEL: TC_ED_03 editor before Edit photo fit crop

- takeScreenshot: TC_ED_03_crop_before
- runFlow: subflows/apply_fit_crop.yaml
- takeScreenshot: TC_ED_03_crop_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: TC_ED_03_crop_before
      AFTER_BASENAME: TC_ED_03_crop_after
      VERIFY_LABEL: TC_ED_03 Edit photo fit crop
      VERIFY_PROFILE: crop

- runFlow: subflows/save_changes.yaml
