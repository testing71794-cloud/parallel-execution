# TC_ID: TC_ED_08 - Adjust saturation with AI verification
appId: com.kodaksmile
name: TC_ED_08_Adjust_saturation
---
- runFlow:
    file: subflows/prepare_editor_cold_start.yaml
    env:
      SCREENSHOT_BASENAME: TC_ED_08_editor_ready
      SCREEN_LABEL: TC_ED_08 editor before Adjust saturation

- takeScreenshot: TC_ED_08_saturation_before
- runFlow: subflows/apply_saturation.yaml
- takeScreenshot: TC_ED_08_saturation_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: TC_ED_08_saturation_before
      AFTER_BASENAME: TC_ED_08_saturation_after
      VERIFY_LABEL: TC_ED_08 Adjust saturation
      VERIFY_PROFILE: adjust

- runFlow: subflows/save_changes.yaml
