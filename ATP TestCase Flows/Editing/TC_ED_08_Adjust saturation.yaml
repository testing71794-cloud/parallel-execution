- runFlow: ../../flows/permissionsFlow.yaml

- runFlow: ../../flows/openAlbum.yaml
- runFlow: ../../flows/Edit.yaml

# ATP steps for traceability: ED_08 - Adjust saturation
# Step 1: action=executeTestCase; target=ED_01; input=None; expected=Edit mode active
# TODO: Map ATP action 'executeTestCase' if this step is not already covered by reusable flows.

# Step 2: action=tapOn; target=Saturation; input=None; expected=Saturation tool selected
- tapOn: "Saturation"
- waitForAnimationToEnd

# Step 3: action=adjustSlider; target=Saturation slider; input=Increase (right); expected=Colors become more vivid
# TODO: Map ATP action 'adjustSlider' if this step is not already covered by reusable flows.

# Step 4: action=adjustSlider; target=Saturation slider; input=Decrease (left); expected=Colors become more muted/grayscale
