# TC_ID: TC_ED_14 - Erase doodle from photo with AI verification
appId: com.kodaksmile
name: TC_ED_14_Erase_doodle_from_photo
---
- runFlow:
    file: subflows/prepare_editor_cold_start.yaml
    env:
      SCREENSHOT_BASENAME: TC_ED_14_editor_ready
      SCREEN_LABEL: TC_ED_14 editor before Erase doodle from photo

- takeScreenshot: TC_ED_14_erase_before
- runFlow: subflows/apply_erase_doodle.yaml
- takeScreenshot: TC_ED_14_erase_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: TC_ED_14_erase_before
      AFTER_BASENAME: TC_ED_14_erase_after
      VERIFY_LABEL: TC_ED_14 Erase doodle from photo
      VERIFY_PROFILE: draw

- runFlow: subflows/save_changes.yaml
