appId: com.kodaksmile
---
# Single-screen OpenRouter verification (editor or gallery).
- runScript:
    file: ../scripts/verify_edit_screen_openrouter.js
    env:
      SCREEN_BASENAME: ${SCREEN_BASENAME}
      SCREEN_LABEL: ${SCREEN_LABEL}
      SCREEN_PROFILE: ${SCREEN_PROFILE}
- assertTrue: ${output.edit_screen_verified}
