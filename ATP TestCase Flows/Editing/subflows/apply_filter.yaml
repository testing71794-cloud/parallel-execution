appId: com.kodaksmile
---
- runFlow:
    when:
      visible: "Filter"
    commands:
      - tapOn: "Filter"
      - waitForAnimationToEnd
- tapOn:
    id: imageViewFilter
    index: 1
- waitForAnimationToEnd
- runFlow:
    when:
      visible: "Ok"
    commands:
      - tapOn: "Ok"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: "Done"
    commands:
      - tapOn: "Done"
      - waitForAnimationToEnd
