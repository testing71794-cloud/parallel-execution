# TC_ID: TC_ED_E01 - Cancel edit without saving with AI verification
appId: com.kodaksmile
name: TC_ED_E01_Cancel_edit_without_saving
---
- runFlow:
    file: subflows/prepare_editor_cold_start.yaml
    env:
      SCREENSHOT_BASENAME: TC_ED_E01_editor_ready
      SCREEN_LABEL: TC_ED_E01 editor before Cancel edit without saving

- takeScreenshot: TC_ED_E01_before
- runFlow: subflows/apply_filter.yaml
- takeScreenshot: TC_ED_E01_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: TC_ED_E01_before
      AFTER_BASENAME: TC_ED_E01_after
      VERIFY_LABEL: TC_ED_E01 Cancel edit without saving
      VERIFY_PROFILE: filter

- runFlow: subflows/cancel_without_saving.yaml
