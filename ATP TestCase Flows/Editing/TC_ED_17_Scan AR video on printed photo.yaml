# TC_ID: TC_ED_17 - Scan AR video with AI screen verification
appId: com.kodaksmile
name: TC_ED_17_Scan_AR_video_on_printed_photo
---
- runFlow:
    file: subflows/prepare_editor_cold_start.yaml
    env:
      SCREENSHOT_BASENAME: TC_ED_17_editor_ready
      SCREEN_LABEL: TC_ED_17 editor before AR scan
- runFlow: subflows/open_ar_tab.yaml
- takeScreenshot: TC_ED_17_ar_scan_screen
- runFlow:
    file: subflows/verify_edit_screen_with_ai.yaml
    env:
      SCREEN_BASENAME: TC_ED_17_ar_scan_screen
      SCREEN_LABEL: TC_ED_17 AR scan
      SCREEN_PROFILE: edit_screen
- runFlow: subflows/save_changes.yaml
