# TC_ID: TC_ED_04 - Rotate photo with AI verification
appId: com.kodaksmile
name: TC_ED_04_Rotate_photo
---
- runFlow:
    file: subflows/prepare_editor_cold_start.yaml
    env:
      SCREENSHOT_BASENAME: TC_ED_04_editor_ready
      SCREEN_LABEL: TC_ED_04 editor before Rotate photo

- takeScreenshot: TC_ED_04_rotate_before
- runFlow: subflows/apply_rotate.yaml
- takeScreenshot: TC_ED_04_rotate_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: TC_ED_04_rotate_before
      AFTER_BASENAME: TC_ED_04_rotate_after
      VERIFY_LABEL: TC_ED_04 Rotate photo
      VERIFY_PROFILE: rotate

- runFlow: subflows/save_changes.yaml
