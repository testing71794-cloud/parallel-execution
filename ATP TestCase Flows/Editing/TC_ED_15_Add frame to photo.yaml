# TC_ID: TC_ED_15 - Add frame to photo with AI verification
appId: com.kodaksmile
name: TC_ED_15_Add_frame_to_photo
---
- runFlow:
    file: subflows/prepare_editor_cold_start.yaml
    env:
      SCREENSHOT_BASENAME: TC_ED_15_editor_ready
      SCREEN_LABEL: TC_ED_15 editor before Add frame to photo

- takeScreenshot: TC_ED_15_frame_before
- runFlow: subflows/apply_frame.yaml
- takeScreenshot: TC_ED_15_frame_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: TC_ED_15_frame_before
      AFTER_BASENAME: TC_ED_15_frame_after
      VERIFY_LABEL: TC_ED_15 Add frame to photo
      VERIFY_PROFILE: frame

- runFlow: subflows/save_changes.yaml
