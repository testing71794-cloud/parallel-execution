appId: com.kodaksmile
name: TC_ED_15_Add frame to photo
---
- launchApp:
    clearState: true
- waitForAnimationToEnd

# Load shared identifiers. This file must exist in ../../elements.
- runFlow: ../../elements/loadElements.yaml

# Common setup: skip account creation and reach onboarding/home path
- runFlow: ../../flows/I will do it later.yaml
- runFlow: ../../flows/Agree Term and Condition.yaml
- runFlow: ../../flows/Onboarding Welcome Screen.yaml
- runFlow: ../../flows/Swipe to continue.yaml
- runFlow: ../../flows/permissionsFlow.yaml

- runFlow: ../../flows/openAlbum.yaml
- runFlow: ../../flows/Edit.yaml

# ATP steps for traceability: ED_15 - Add frame to photo
# Step 1: action=executeTestCase; target=ED_01; input=None; expected=Edit mode active
# TODO: Map ATP action 'executeTestCase' if this step is not already covered by reusable flows.

# Step 2: action=tapOn; target=Frames; input=None; expected=Frames panel opens
- tapOn: "Frames"
- waitForAnimationToEnd

# Step 3: action=scroll; target=Category list; input=Horizontal; expected=Category options visible
# TODO: Map ATP action 'scroll' if this step is not already covered by reusable flows.

# Step 4: action=tapOn; target=Category; input=None; expected=Category frames displayed
- tapOn: "Category"
- waitForAnimationToEnd

# Step 5: action=tapOn; target=Frame (download); input=None; expected=Frame downloaded
- tapOn: "Frame (download)"
- waitForAnimationToEnd

# Step 6: action=tapOn; target=Frame; input=None; expected=Frame applied to photo
- tapOn: "Frame"
- waitForAnimationToEnd

# Step 7: action=tapOn; target=Done; input=None; expected=Frame saved on photo
- tapOn: "Done"
- waitForAnimationToEnd

