# TC_ID: TC_ED_16 - Add AR video with AI screen verification
appId: com.kodaksmile
name: TC_ED_16_Add_AR_video_to_photo
---
- runFlow:
    file: subflows/prepare_editor_cold_start.yaml
    env:
      SCREENSHOT_BASENAME: TC_ED_16_editor_ready
      SCREEN_LABEL: TC_ED_16 editor before AR
- runFlow: subflows/open_ar_tab.yaml
- takeScreenshot: TC_ED_16_ar_screen
- runFlow:
    file: subflows/verify_edit_screen_with_ai.yaml
    env:
      SCREEN_BASENAME: TC_ED_16_ar_screen
      SCREEN_LABEL: TC_ED_16 AR tab
      SCREEN_PROFILE: edit_screen
- runFlow: subflows/save_changes.yaml
