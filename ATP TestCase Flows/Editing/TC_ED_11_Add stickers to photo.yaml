# TC_ID: TC_ED_11 - Add stickers to photo with AI verification
appId: com.kodaksmile
name: TC_ED_11_Add_stickers_to_photo
---
- runFlow:
    file: subflows/prepare_editor_cold_start.yaml
    env:
      SCREENSHOT_BASENAME: TC_ED_11_editor_ready
      SCREEN_LABEL: TC_ED_11 editor before Add stickers to photo

- takeScreenshot: TC_ED_11_sticker_before
- runFlow: subflows/apply_stickers.yaml
- takeScreenshot: TC_ED_11_sticker_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: TC_ED_11_sticker_before
      AFTER_BASENAME: TC_ED_11_sticker_after
      VERIFY_LABEL: TC_ED_11 Add stickers to photo
      VERIFY_PROFILE: sticker

- runFlow: subflows/save_changes.yaml
