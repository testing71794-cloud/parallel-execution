# TODO: Map ATP action 'longPress' if this step is not already covered by reusable flows.

# Step 9: action=drag; target=Resize handle; input=Resize and rotate; expected=Sticker resized and rotated
# TODO: Map ATP action 'drag' if this step is not already covered by reusable flows.

# Step 10: action=tapOn; target=Done; input=None; expected=Sticker saved on photo
- tapOn: "Done"
- waitForAnimationToEnd

