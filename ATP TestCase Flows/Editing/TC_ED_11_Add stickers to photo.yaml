- runFlow: ../../flows/Onboarding Welcome Screen.yaml
- runFlow: ../../flows/Swipe to continue.yaml
- runFlow: ../../flows/permissionsFlow.yaml

- runFlow: ../../flows/openAlbum.yaml
- runFlow: ../../flows/Edit.yaml

# ATP steps for traceability: ED_11 - Add stickers to photo
# Step 1: action=executeTestCase; target=ED_01; input=None; expected=Edit mode active
# TODO: Map ATP action 'executeTestCase' if this step is not already covered by reusable flows.

# Step 2: action=tapOn; target=Stickers; input=None; expected=Stickers panel opens
- tapOn: "Stickers"
- waitForAnimationToEnd

# Step 3: action=scroll; target=Category list; input=Horizontal; expected=Category options visible
# TODO: Map ATP action 'scroll' if this step is not already covered by reusable flows.

# Step 4: action=tapOn; target=Category; input=None; expected=Category stickers displayed
