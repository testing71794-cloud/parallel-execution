# TC_ID: TC_ED_06 - Adjust contrast with AI verification
appId: com.kodaksmile
name: TC_ED_06_Adjust_contrast
---
- runFlow:
    file: subflows/prepare_editor_cold_start.yaml
    env:
      SCREENSHOT_BASENAME: TC_ED_06_editor_ready
      SCREEN_LABEL: TC_ED_06 editor before Adjust contrast

- takeScreenshot: TC_ED_06_contrast_before
- runFlow: subflows/apply_contrast.yaml
- takeScreenshot: TC_ED_06_contrast_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: TC_ED_06_contrast_before
      AFTER_BASENAME: TC_ED_06_contrast_after
      VERIFY_LABEL: TC_ED_06 Adjust contrast
      VERIFY_PROFILE: adjust

- runFlow: subflows/save_changes.yaml
