- runFlow: ../../flows/Onboarding Welcome Screen.yaml
- runFlow: ../../flows/Swipe to continue.yaml
- runFlow: ../../flows/permissionsFlow.yaml

- runFlow: ../../flows/openAlbum.yaml
- runFlow: ../../flows/Edit.yaml

# ATP steps for traceability: ED_06 - Adjust contrast
# Step 1: action=executeTestCase; target=ED_01; input=None; expected=Edit mode active
# TODO: Map ATP action 'executeTestCase' if this step is not already covered by reusable flows.

# Step 2: action=tapOn; target=Contrast; input=None; expected=Contrast tool selected
- tapOn: "Contrast"
- waitForAnimationToEnd

# Step 3: action=adjustSlider; target=Contrast slider; input=Increase (right); expected=Photo contrast increases
# TODO: Map ATP action 'adjustSlider' if this step is not already covered by reusable flows.

# Step 4: action=adjustSlider; target=Contrast slider; input=Decrease (left); expected=Photo contrast decreases
# TODO: Map ATP action 'adjustSlider' if this step is not already covered by reusable flows.

# Step 5: action=tapOn; target=Done; input=None; expected=Contrast adjustment saved
- tapOn: "Done"
- waitForAnimationToEnd

