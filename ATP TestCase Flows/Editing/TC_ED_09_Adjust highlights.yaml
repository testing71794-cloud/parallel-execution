# TC_ID: TC_ED_09 - Adjust highlights with AI verification
appId: com.kodaksmile
name: TC_ED_09_Adjust_highlights
---
- runFlow:
    file: subflows/prepare_editor_cold_start.yaml
    env:
      SCREENSHOT_BASENAME: TC_ED_09_editor_ready
      SCREEN_LABEL: TC_ED_09 editor before Adjust highlights

- takeScreenshot: TC_ED_09_highlights_before
- runFlow: subflows/apply_highlights.yaml
- takeScreenshot: TC_ED_09_highlights_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: TC_ED_09_highlights_before
      AFTER_BASENAME: TC_ED_09_highlights_after
      VERIFY_LABEL: TC_ED_09 Adjust highlights
      VERIFY_PROFILE: adjust

- runFlow: subflows/save_changes.yaml
