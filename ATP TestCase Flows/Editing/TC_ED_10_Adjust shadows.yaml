# TC_ID: TC_ED_10 - Adjust shadows with AI verification
appId: com.kodaksmile
name: TC_ED_10_Adjust_shadows
---
- runFlow:
    file: subflows/prepare_editor_cold_start.yaml
    env:
      SCREENSHOT_BASENAME: TC_ED_10_editor_ready
      SCREEN_LABEL: TC_ED_10 editor before Adjust shadows

- takeScreenshot: TC_ED_10_shadows_before
- runFlow: subflows/apply_shadows.yaml
- takeScreenshot: TC_ED_10_shadows_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: TC_ED_10_shadows_before
      AFTER_BASENAME: TC_ED_10_shadows_after
      VERIFY_LABEL: TC_ED_10 Adjust shadows
      VERIFY_PROFILE: adjust

- runFlow: subflows/save_changes.yaml
