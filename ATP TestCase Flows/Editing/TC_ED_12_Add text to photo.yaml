appId: com.kodaksmile
name: TC_ED_12_Add text to photo
---
- launchApp:
    clearState: true
- waitForAnimationToEnd

# Load shared identifiers. This file must exist in ../../elements.
- runFlow: ../../elements/loadElements.yaml

# Common setup: skip account creation and reach onboarding/home path
- runFlow: ../../flows/I will do it later.yaml
- runFlow: ../../flows/Agree Term and Condition.yaml
- runFlow: ../../flows/Onboarding Welcome Screen.yaml
- runFlow: ../../flows/Swipe to continue.yaml
- runFlow: ../../flows/permissionsFlow.yaml

- runFlow: ../../flows/openAlbum.yaml
- runFlow: ../../flows/Edit.yaml

# ATP steps for traceability: ED_12 - Add text to photo
# Step 1: action=executeTestCase; target=ED_01; input=None; expected=Edit mode active
# TODO: Map ATP action 'executeTestCase' if this step is not already covered by reusable flows.

# Step 2: action=tapOn; target=Text; input=None; expected=Text input panel opens
- tapOn: "Text"
- waitForAnimationToEnd

# Step 3: action=inputText; target=Text field; input=Hello World; expected=Text entered
- tapOn: "Text field"
- inputText: "Hello World"
- waitForAnimationToEnd

# Step 4: action=tapOn; target=Font selector; input=None; expected=Font options displayed
- tapOn: "Font selector"
- waitForAnimationToEnd

# Step 5: action=tapOn; target=Font option; input=None; expected=Font changed
- tapOn: "Font option"
- waitForAnimationToEnd

# Step 6: action=tapOn; target=Paint/Color button; input=None; expected=Color picker displayed
- tapOn: "Paint/Color button"
- waitForAnimationToEnd

# Step 7: action=tapOn; target=Color; input=None; expected=Text color changed
- tapOn: "Color"
- waitForAnimationToEnd

# Step 8: action=tapOn; target=Done (keyboard); input=None; expected=Text added to canvas
- tapOn: "Done (keyboard)"
- waitForAnimationToEnd

# Step 9: action=drag; target=Text on canvas; input=Adjust position; expected=Text position updated
# TODO: Map ATP action 'drag' if this step is not already covered by reusable flows.

# Step 10: action=longPress; target=Resize button; input=None; expected=Resize mode active
# TODO: Map ATP action 'longPress' if this step is not already covered by reusable flows.

# Step 11: action=drag; target=Resize handle; input=Resize and rotate; expected=Text resized and rotated
# TODO: Map ATP action 'drag' if this step is not already covered by reusable flows.

# Step 12: action=tapOn; target=Done; input=None; expected=Text saved on photo
- tapOn: "Done"
- waitForAnimationToEnd

