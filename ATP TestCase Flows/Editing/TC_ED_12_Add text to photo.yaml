# TC_ID: TC_ED_12 - Add text to photo with AI verification
appId: com.kodaksmile
name: TC_ED_12_Add_text_to_photo
---
- runFlow:
    file: subflows/prepare_editor_cold_start.yaml
    env:
      SCREENSHOT_BASENAME: TC_ED_12_editor_ready
      SCREEN_LABEL: TC_ED_12 editor before Add text to photo

- takeScreenshot: TC_ED_12_text_before
- runFlow: subflows/apply_text.yaml
- takeScreenshot: TC_ED_12_text_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: TC_ED_12_text_before
      AFTER_BASENAME: TC_ED_12_text_after
      VERIFY_LABEL: TC_ED_12 Add text to photo
      VERIFY_PROFILE: text

- runFlow: subflows/save_changes.yaml
