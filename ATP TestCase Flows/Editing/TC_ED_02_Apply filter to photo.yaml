appId: com.kodaksmile
name: TC_ED_02_Apply filter to photo
---
- launchApp:
    clearState: true
- waitForAnimationToEnd

# Load shared identifiers. This file must exist in ../../elements.
- runFlow: ../../elements/loadElements.yaml

# Common setup: skip account creation and reach onboarding/home path
- runFlow: ../../flows/I will do it later.yaml
- runFlow: ../../flows/Agree Term and Condition.yaml
- runFlow: ../../flows/Onboarding Welcome Screen.yaml
- runFlow: ../../flows/Swipe to continue.yaml
- runFlow: ../../flows/permissionsFlow.yaml

- runFlow: ../../flows/openAlbum.yaml
- runFlow: ../../flows/Edit.yaml

# ATP steps for traceability: ED_02 - Apply filter to photo
# Step 1: action=tapOn; target=Album; input=None; expected=Album opens
- tapOn: "Album"
- waitForAnimationToEnd

# Step 2: action=tapOn; target=Photo; input=None; expected=Photo preview displayed
- tapOn: "Photo"
- waitForAnimationToEnd

# Step 3: action=tapOn; target=Close overlay; input=None; expected=Overlay dismissed
- tapOn: "Close overlay"
- waitForAnimationToEnd

# Step 4: action=tapOn; target=Filter option; input=None; expected=Filter thumbnails displayed
- tapOn: "Filter option"
- waitForAnimationToEnd

# Step 5: action=tapOn; target=OK; input=None; expected=Overlay dismissed
- tapOn: "OK"
- waitForAnimationToEnd

# Step 6: action=tapOn; target=Filter thumbnail; input=None; expected=Filter applied to preview
- tapOn: "Filter thumbnail"
- waitForAnimationToEnd

# Step 7: action=adjustSlider; target=Intensity slider; input=75%; expected=Filter intensity adjusted
# TODO: Map ATP action 'adjustSlider' if this step is not already covered by reusable flows.

# Step 8: action=tapOn; target=Done; input=None; expected=Filter applied and saved
- tapOn: "Done"
- waitForAnimationToEnd

