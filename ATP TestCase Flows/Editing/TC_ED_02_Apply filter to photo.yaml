# TC_ID: TC_ED_02 - Apply filter to photo with AI verification
appId: com.kodaksmile
name: TC_ED_02_Apply_filter_to_photo
---
- runFlow:
    file: subflows/prepare_editor_cold_start.yaml
    env:
      SCREENSHOT_BASENAME: TC_ED_02_editor_ready
      SCREEN_LABEL: TC_ED_02 editor before Apply filter to photo

- takeScreenshot: TC_ED_02_filter_before
- runFlow: subflows/apply_filter.yaml
- takeScreenshot: TC_ED_02_filter_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: TC_ED_02_filter_before
      AFTER_BASENAME: TC_ED_02_filter_after
      VERIFY_LABEL: TC_ED_02 Apply filter to photo
      VERIFY_PROFILE: filter

- runFlow: subflows/save_changes.yaml
