# TC_ID: TC_ED_13 - Add doodle to photo with AI verification
appId: com.kodaksmile
name: TC_ED_13_Add_doodle_to_photo
---
- runFlow:
    file: subflows/prepare_editor_cold_start.yaml
    env:
      SCREENSHOT_BASENAME: TC_ED_13_editor_ready
      SCREEN_LABEL: TC_ED_13 editor before Add doodle to photo

- takeScreenshot: TC_ED_13_doodle_before
- runFlow: subflows/apply_doodle.yaml
- takeScreenshot: TC_ED_13_doodle_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: TC_ED_13_doodle_before
      AFTER_BASENAME: TC_ED_13_doodle_after
      VERIFY_LABEL: TC_ED_13 Add doodle to photo
      VERIFY_PROFILE: draw

- runFlow: subflows/save_changes.yaml
