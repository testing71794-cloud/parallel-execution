# TC_ID: TC_ED_E03 - Edit very large image with AI verification
appId: com.kodaksmile
name: TC_ED_E03_Edit_very_large_image
---
- runFlow:
    file: subflows/prepare_editor_cold_start.yaml
    env:
      SCREENSHOT_BASENAME: TC_ED_E03_editor_ready
      SCREEN_LABEL: TC_ED_E03 editor before Edit very large image

- takeScreenshot: TC_ED_E03_before
- runFlow: subflows/apply_filter.yaml
- takeScreenshot: TC_ED_E03_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: TC_ED_E03_before
      AFTER_BASENAME: TC_ED_E03_after
      VERIFY_LABEL: TC_ED_E03 Edit very large image
      VERIFY_PROFILE: filter

- runFlow: subflows/save_changes.yaml
