# TC_ID: TC_ED_07 - Adjust warmth with AI verification
appId: com.kodaksmile
name: TC_ED_07_Adjust_warmth
---
- runFlow:
    file: subflows/prepare_editor_cold_start.yaml
    env:
      SCREENSHOT_BASENAME: TC_ED_07_editor_ready
      SCREEN_LABEL: TC_ED_07 editor before Adjust warmth

- takeScreenshot: TC_ED_07_warmth_before
- runFlow: subflows/apply_warmth.yaml
- takeScreenshot: TC_ED_07_warmth_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: TC_ED_07_warmth_before
      AFTER_BASENAME: TC_ED_07_warmth_after
      VERIFY_LABEL: TC_ED_07 Adjust warmth
      VERIFY_PROFILE: temperature

- runFlow: subflows/save_changes.yaml
