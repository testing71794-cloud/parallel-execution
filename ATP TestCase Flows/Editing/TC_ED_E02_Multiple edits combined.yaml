# TC_ID: TC_ED_E02 - Multiple edits combined with AI verification
appId: com.kodaksmile
name: TC_ED_E02_Multiple_edits_combined
---
- runFlow:
    file: subflows/prepare_editor_cold_start.yaml
    env:
      SCREENSHOT_BASENAME: TC_ED_E02_editor_ready
      SCREEN_LABEL: TC_ED_E02 editor before Multiple edits combined

- takeScreenshot: TC_ED_E02_before
- runFlow: subflows/apply_multiple_edits.yaml
- takeScreenshot: TC_ED_E02_after
- runFlow:
    file: subflows/verify_visual_pair_with_ai.yaml
    env:
      BEFORE_BASENAME: TC_ED_E02_before
      AFTER_BASENAME: TC_ED_E02_after
      VERIFY_LABEL: TC_ED_E02 Multiple edits combined
      VERIFY_PROFILE: adjust

- runFlow: subflows/save_changes.yaml
