appId: com.kodaksmile
name: PR_05_03_Precut_Different_Photo_Two_From_Album
---
- launchApp:
    clearState: false
- runFlow: ../../elements/loadElements.yaml
- runFlow:
    when:
      visible:
        text: "Rate App"
    commands:
      - tapOn: "No Thanks"
- assertVisible: ${output.home.titleText}
- runFlow: ../../flows/openAlbum.yaml
- runFlow: ../../flows/selectSinglePhoto.yaml
- waitForAnimationToEnd
- runFlow: ../../flows/editor_wait_and_open_precuts.yaml
- assertVisible: |-
    CREATE PRE-CUT
     STICKERS
- waitForAnimationToEnd
- tapOn:
    point: "12%,78%"
- waitForAnimationToEnd
- tapOn:
    point: "50%,78%"
- waitForAnimationToEnd
- tapOn: "Next"
- tapOn: "Save"
- waitForAnimationToEnd
- runFlow:
    when:
      visible: "Time to Fine-Tune"
    commands:
      - runFlow:
          when:
            visible: "Ok"
          commands:
            - tapOn: "Ok"
      - runFlow:
          when:
            visible: "OK"
          commands:
            - tapOn: "OK"
      - waitForAnimationToEnd

- tapOn: "Close"
- runFlow:
    when:
      visible: "Save Photo?"
    commands:
      - tapOn: "Save"
- runFlow:
    when:
      visible: "Cancel"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: "All Photos"
    commands:
      - tapOn:
          point: "1%,9%"
      - waitForAnimationToEnd
