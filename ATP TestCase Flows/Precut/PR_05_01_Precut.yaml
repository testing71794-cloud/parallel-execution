appId: com.kodaksmile
name: PR_05_01_Precut Print  + Back + Home screen
---
- launchApp:
    clearState: true
- waitForAnimationToEnd
# Load elements (POM)
- runFlow: ../../elements/loadElements.yaml
- runFlow: ../../flows/I will do it later.yaml
- runFlow: ../../flows/Agree Term and Condition.yaml
- runFlow: ../../flows/permissionsFlow.yaml
- runFlow: ../../flows/Onboarding Welcome Screen.yaml
- runFlow:
    when:
      visible: "Swipe to continue"
    commands:
      - tapOn:
          point: "50%,50%"
      - waitForAnimationToEnd
      - swipe:
          start: "75%,55%"
          end: "15%,45%"
      - waitForAnimationToEnd
- runFlow: ../../flows/onboardingSkip.yaml
- runFlow:
    when:
      visible:
        text: "Rate App"
    commands:
      - tapOn: "No Thanks"
- assertVisible: ${output.home.titleText}
- runFlow: ../../flows/openAlbum.yaml
- runFlow: ../../flows/selectSinglePhoto.yaml
- waitForAnimationToEnd
- runFlow: ../../flows/editor_wait_and_open_precuts.yaml

# ----------------------------
# 2) CREATE PRE-CUT STICKERS (photo picker)
# ----------------------------
- assertVisible: |-
    CREATE PRE-CUT
     STICKERS

# Select 2 photos (best-effort by coordinates because IDs are unknown in the video)
# Adjust these points if your grid layout differs.
- tapOn:
    point: "12%,78%" # bottom-left thumbnail
- waitForAnimationToEnd
- tapOn:
    point: "50%,78%" # another thumbnail near the middle
- waitForAnimationToEnd

- assertVisible: "Next"
- tapOn: "Next"
- waitForAnimationToEnd

# ----------------------------
# 3) ADJUST PRE-CUT STICKERS screen
# ----------------------------
- assertVisible: |-
    ADJUST PRE-CUT
     STICKERS
- assertVisible: "Save"
- tapOn: "Save"
- waitForAnimationToEnd

- tapOn: "Close"
- runFlow:
    when:
      visible: "Save Photo?"
    commands:
      - tapOn: "Save"
- runFlow:
    when:
      visible: "All Photos"
    commands:
      - tapOn:
          point: "1%,9%"
      - waitForAnimationToEnd
