appId: com.kodaksmile
name: PR_05_04_Precut_Same_Photo_From_Album -swap
---
- launchApp:
    clearState: false
- runFlow:
    when:
      visible:
        text: "Rate App"
    commands:
      - tapOn: "No Thanks"
- assertVisible: ${output.home.titleText}
- runFlow: ../../flows/openAlbum.yaml
- runFlow: ../../flows/selectSinglePhoto.yaml
- waitForAnimationToEnd
- runFlow:
    when:
      visible: ${output.editor.precutsTab}
    commands:
      - tapOn: ${output.editor.precutsTab}
      - waitForAnimationToEnd
      - tapOn:
          point: "20%,60%"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: "Pre-Cut Stickers"
    commands:
      - runFlow:
          when:
            visible: "Kodak 2x3 Pre-Cut Sticker Paper"
          commands:
            - tapOn: "Kodak 2x3 Pre-Cut Sticker Paper"
            - waitForAnimationToEnd
            - back
            - waitForAnimationToEnd
      - tapOn: "OK"
      - waitForAnimationToEnd
- assertVisible: "CREATE PRE-CUT STICKERS"
- waitForAnimationToEnd
- tapOn:
    id: relativeLayoutItem
- waitForAnimationToEnd
- tapOn: "Next"
- waitForAnimationToEnd
- tapOn: "Save"
- waitForAnimationToEnd
- tapOn: "Close"
- runFlow:
    when:
      visible: "Save Photo?"
    commands:
      - tapOn: "Save"
- runFlow:
    when:
      visible: "All Photos"
    commands:
      - tapOn:
          point: "1%,9%"
      - waitForAnimationToEnd