appId: com.kodaksmile
name: TC_ON_05_Print my first picture
---
- launchApp:
    clearState: true
- waitForAnimationToEnd

# Load shared identifiers. This file must exist in ../../elements.
- runFlow: ../../elements/loadElements.yaml

# Common setup: skip account creation and reach onboarding/home path- runFlow: ../../elements/loadElements.yaml

# Step 2: action=tapOn; target=I'll do it later; input=None; expected=Terms screen appears
- runFlow: ../../flows/I will do it later.yaml
- waitForAnimationToEnd

# Step 3: action=tapOn; target=Terms checkbox; input=None; expected=Checkbox selected
- runFlow: ../../flows/Agree Term and Condition.yaml

- runFlow:
    file: ../../flows/onboardingFindDevice.yaml
    env:
      DEVICE_FIND_LABEL: "Find My Camera"
- assertVisible:
    text: "Search Again|We couldn't find"
- waitForAnimationToEnd

- swipe:
    start: 90%, 50%
    end: 10%, 50%
    duration: 500
# 6) First print onboarding (optional)
# ------------------------------
- runFlow:
    when:
      visible: "Print My First Picture"
    commands:
      - tapOn: "Print My First Picture"
      - waitForAnimationToEnd

# ------------------------------
# 7) Fine-tune popup (optional)
# ------------------------------
- runFlow:
    when:
      visible: "Time to Fine-Tune"
    commands:
      - runFlow:
          when:
            visible: "Ok"
          commands:
            - tapOn: "Ok"
      - runFlow:
          when:
            visible: "OK"
          commands:
            - tapOn: "OK"
      - waitForAnimationToEnd
- assertVisible: "Edit"
- assertVisible: "Pre-Cuts"
- assertVisible: "AR"
- assertVisible: "Filter"
- assertVisible: "Close"
- assertVisible: "Share"




