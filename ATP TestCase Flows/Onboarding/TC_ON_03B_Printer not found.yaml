appId: com.kodaksmile
name: TC_ON_03B_Printer not found
---
- launchApp:
    clearState: true
- waitForAnimationToEnd

- runFlow: ../../elements/loadElements.yaml

- runFlow: ../../flows/I will do it later.yaml
- waitForAnimationToEnd

- runFlow: ../../flows/Agree Term and Condition.yaml

- runFlow:
    file: ../../flows/onboardingFindDevice.yaml
    env:
      DEVICE_FIND_LABEL: "Find My Printer"

# Expect printer search to time out when no printer is nearby
- extendedWaitUntil:
    visible: "We couldn't find"
    timeout: 60000
- assertVisible: "We couldn't find"
- assertVisible: "your printer"
