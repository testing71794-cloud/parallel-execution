appId: com.kodaksmile
name: TC_CA_01_Enter camera mode
---
- runFlow: ../../elements/loadElements.yaml

- launchApp:
    clearState: true
- waitForAnimationToEnd
- runFlow: ../../flows/I will do it later.yaml
- runFlow: ../../flows/Agree Term and Condition.yaml
- runFlow: ../../flows/permissionsFlow.yaml
- runFlow: ../../flows/Onboarding Welcome Screen.yaml
- runFlow: ../../flows/swipe screen.yaml
- swipe:
   start: "75%,55%"
   end: "15%,45%"
- waitForAnimationToEnd
# Load camera paper screen
- runFlow:
    when:
      visible: "KODAK ZINK"
    commands:
      - assertVisible: "KODAK ZINK"
      - assertVisible: "Go to Homepage"

      - tapOn: "Go to Homepage"
      - waitForAnimationToEnd
- runFlow: ../../flows/handleRateApp.yaml

# ----------- HOME -----------
- assertVisible: ${output.home.titleText}

# Handle Android camera permission safely
- runFlow:
    when:
      visible: "Enable camera access"
    commands:
      - tapOn: "Enable camera access"
      - waitForAnimationToEnd

- runFlow:
    when:
      visible: "While using the app"
    commands:
      - tapOn: "While using the app"

- runFlow:
    when:
      visible: "Allow"
    commands:
      - tapOn: "Allow"

# ----------- CAMERA (AR) -----------
# Open camera (best effort by tapping bottom center)
- tapOn:
    point: "50%,92%"
- waitForAnimationToEnd
# Close live filter tutorial by clicking OK
- runFlow:
    when:
      visible: "Swipe left to apply live filters"
    commands:
      - assertVisible: "Ok"
      - tapOn: "Ok"
      - waitForAnimationToEnd
# -------- Assert camera screen elements --------
- assertVisible: "Close"
- assertVisible: "Scan"

