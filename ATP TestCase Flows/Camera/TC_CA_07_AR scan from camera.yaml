appId: com.kodaksmile
name: TC_CA_07_AR scan from camera
---
- runFlow: ../../flows/camera_module_setup.yaml
- runFlow: ../../flows/camera_module_open_ar_camera.yaml
# -------- Assert camera screen elements --------
- assertVisible: "Close"
- assertVisible: "Scan"

# (optional additional check)
- assertVisible:
    text: "Scan"

# -------- Click AR Scan --------
- tapOn: "Scan"
- waitForAnimationToEnd
# Handle AR Scan Tip popup
- runFlow:
    when:
      visible: "AR Scan Tip:"
    commands:
      # Assert popup elements
      - assertVisible: "AR Scan Tip:"
      - assertVisible: "Ok"

      # Click OK
      - tapOn: "Ok"
      - waitForAnimationToEnd
# (optional additional check)
- assertVisible:
    text: "Scan"

# -------- Click AR Scan --------
- tapOn: "Scan"
- waitForAnimationToEnd
