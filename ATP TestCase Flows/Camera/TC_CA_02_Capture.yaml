appId: com.kodaksmile
name: TC_CA_02_Capture 
---
- runFlow: ../../flows/camera_module_setup.yaml
# Kodak camera hardware path (phone-only runs skip to AR camera smoke check)
- runFlow:
    when:
      visible: "Search Again"
    commands:
      - assertVisible: "Search Again"
      - waitForAnimationToEnd
      - swipe:
          start: 90%, 50%
          end: 10%, 50%
          duration: 500
      - swipe:
          start: 90%, 50%
          end: 10%, 50%
          duration: 500
      - extendedWaitUntil:
          visible: "Take a Picture"
          timeout: 10000
      - tapOn:
          text: "Take a Picture"
      - tapOn:
          text: "OK"
          optional: true
      - waitForAnimationToEnd
      - waitForAnimationToEnd
      - tapOn:
          id: "cameraImageView"
      - waitForAnimationToEnd
      - tapOn:
          id: "imageViewPreview"
      - tapOn:
          text: "OK"
          optional: true
      - waitForAnimationToEnd
      - assertVisible:
          id: "layoutPrinter"
      - assertVisible: "Pre-Cuts"
      - assertVisible: "Edit"
      - tapOn: "Print"
      - waitForAnimationToEnd
      - waitForAnimationToEnd
      - tapOn: "Connect"
      - runFlow:
          when:
            visible: "Print"
          commands:
            - tapOn: "Print"
      - waitForAnimationToEnd
      - waitForAnimationToEnd
      - runFlow:
          when:
            visible: "Home"
          commands:
            - assertVisible: "Home"
- runFlow:
    when:
      notVisible: "Search Again"
    commands:
      - runFlow: ../../flows/camera_module_open_ar_camera.yaml