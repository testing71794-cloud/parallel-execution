appId: com.kodaksmile
name: TC_CA_05_Capture photo with filter
---
- runFlow: ../../flows/camera_module_setup.yaml
- runFlow:
    when:
      visible: "Search Again"
    commands:
      - assertVisible: "Search Again"
      - waitForAnimationToEnd
      - swipe:
          start: 90%, 50%
          end: 10%, 50%
          duration: 500
      - swipe:
          start: 90%, 50%
          end: 10%, 50%
          duration: 500
      - extendedWaitUntil:
          visible: "Take a Picture"
          timeout: 10000
      - tapOn:
          text: "Take a Picture"
      - tapOn:
          text: "OK"
          optional: true
      - waitForAnimationToEnd
      - swipe:
          start: "75%,55%"
          end: "15%,45%"
      - swipe:
          start: "75%,55%"
          end: "15%,45%"
      - swipe:
          start: "75%,55%"
          end: "15%,45%"
      - waitForAnimationToEnd
      - tapOn:
          id: "cameraImageView"
      - waitForAnimationToEnd
      - tapOn:
          id: "imageViewPreview"
      - tapOn:
          text: "OK"
          optional: true
      - waitForAnimationToEnd
      - assertVisible:
          id: "layoutPrinter"
      - assertVisible: "Pre-Cuts"
      - assertVisible: "Edit"
- runFlow:
    when:
      notVisible: "Search Again"
    commands:
      - runFlow: ../../flows/camera_module_open_ar_camera.yaml