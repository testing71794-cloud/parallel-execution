appId: com.kodaksmile
name: TC_CA_06_Close camera view
---
- runFlow: ../../flows/camera_module_setup.yaml
- runFlow: ../../flows/camera_module_open_ar_camera.yaml
# -------- Assert camera screen elements --------
- assertVisible: "Close"
- assertVisible: "Scan"

# (optional additional check)
- assertVisible:
    text: "Scan"

# -------- Click AR Scan --------
- tapOn: "Scan"
- waitForAnimationToEnd
# Handle AR Scan Tip popup
- runFlow:
    when:
      visible: "AR Scan Tip:"
    commands:
      # Assert popup elements
      - assertVisible: "AR Scan Tip:"
      - assertVisible: "Ok"

      # Click OK
      - tapOn: "Ok"
      - waitForAnimationToEnd
# (optional additional check)
- assertVisible:
    text: "Scan"

# -------- Click AR Scan --------
- tapOn: "Scan"
- waitForAnimationToEnd
# Assert AR scan screen then click Camera after wait
- runFlow:
    when:
      visible: "Camera"
    commands:
      - assertVisible: "Close"
      - assertVisible: "Camera"
      - waitForAnimationToEnd
      - tapOn: "Camera"
      - waitForAnimationToEnd
# Assert camera screen elements then click Close
- runFlow:
    when:
      visible: "Close"
    commands:
      - assertVisible: "Close"
      - assertVisible: "Scan"

      - tapOn: "Close"
      - waitForAnimationToEnd
# Back on home aasertion
- assertVisible: ${output.home.titleText}    