appId: com.kodaksmile
name: TC_PR_01_Print single photo
---
- launchApp:
    clearState: true
- waitForAnimationToEnd

# Load shared identifiers. This file must exist in ../../elements.
- runFlow: ../../elements/loadElements.yaml

# Common setup: skip account creation and reach onboarding/home path- runFlow: ../../elements/loadElements.yaml

# Step 2: action=tapOn; target=I'll do it later; input=None; expected=Terms screen appears
- runFlow: ../../flows/I will do it later.yaml
- waitForAnimationToEnd

# Step 3: action=tapOn; target=Terms checkbox; input=None; expected=Checkbox selected
- runFlow: ../../flows/Agree Term and Condition.yaml

# Step 5: action=verify; target=Welcome screen; input=None; expected=Find My Printer and Find My Camera options visible
- assertVisible: "Welcome"
- assertVisible: "Which device would you like to connect?"
- tapOn: "Find My Camera"
- runFlow:
    when:
      visible: "Swipe to continue"
    commands:
      - tapOn:
          point: "50%,50%"
      - waitForAnimationToEnd
      - swipe:
          start: "75%,55%"
          end: "15%,45%"
      - waitForAnimationToEnd
- tapOn: "Skip"
- waitForAnimationToEnd
# Step 6: action=verify; target=Gallery page; input=None; expected=Gallery/home page displayed
- assertVisible: "KODAK SMILE"
- assertVisible: "Connect"
- assertVisible: "Disconnected"
- assertVisible:
    id: "cameraImageView"
- runFlow:
    when:
      visible:
        text: "Connect"
    commands:
      - tapOn:
          text: "Connect"
- waitForAnimationToEnd
- waitForAnimationToEnd
- runFlow:
    when:
      visible:
        text: "Connect"
    commands:
      - tapOn:
          text: "Connect"
- tapOn:
    id: "imageViewGallery"
- waitForAnimationToEnd
- tapOn:
    id: "imageViewPhoto"
- runFlow:
    when:
      visible: "OK"
    commands:
      - tapOn: "OK"
- waitForAnimationToEnd
- tapOn: "Print"
- waitForAnimationToEnd
- tapOn: "Print"
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertVisible: "Print Successful"
