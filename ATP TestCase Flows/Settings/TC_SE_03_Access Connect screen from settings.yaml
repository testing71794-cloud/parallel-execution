appId: com.kodaksmile
name: TC_SE_03_Access Connect screen from settings
---
- launchApp:
    clearState: false
- waitForAnimationToEnd
- runFlow:
    when:
      visible:
        text: "Rate App"
    commands:
      - tapOn: "No Thanks"
- waitForAnimationToEnd
- assertVisible:
    id: "settingImageView"
- tapOn:
    id: "settingImageView"

- waitForAnimationToEnd

# ATP steps for traceability: SE_03 - Access Connect screen from settings
# Step 1: action=precondition; target=None; input=No device connected; expected=Device disconnected
# Precondition: No device connected

# Step 2: action=tapOn; target=Connect; input=None; expected=Connect/discovery page displayed
- tapOn: "Connect"

# Step 3: action=verify; target=Connect page; input=None; expected=Device search initiated
- assertVisible: "Searching for"
- assertVisible: "your device..."

