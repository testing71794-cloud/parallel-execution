appId: com.kodaksmile
name: TC_SE_03_Access Connect screen from settings
---
- launchApp:
    clearState: true
- waitForAnimationToEnd

# Load shared identifiers. This file must exist in ../../elements.
- runFlow: ../../elements/loadElements.yaml

# Common setup: skip account creation and reach onboarding/home path
- runFlow: ../../flows/I will do it later.yaml
- runFlow: ../../flows/Agree Term and Condition.yaml
- runFlow: ../../flows/permissionsFlow.yaml
- runFlow: ../../flows/Onboarding Welcome Screen.yaml
- runFlow:
    when:
      visible: "Swipe to continue"
    commands:
      - tapOn:
          point: "50%,50%"
      - waitForAnimationToEnd
      - swipe:
          start: "75%,55%"
          end: "15%,45%"
      - waitForAnimationToEnd
- runFlow: ../../flows/onboardingSkip.yaml

- waitForAnimationToEnd
- assertVisible: ${output.home.titleText}
- assertVisible:
    id: "settingImageView"
- tapOn:
    id: "settingImageView"

- waitForAnimationToEnd

# ATP steps for traceability: SE_03 - Access Connect screen from settings
# Step 1: action=precondition; target=None; input=No device connected; expected=Device disconnected
# Precondition: No device connected

# Step 2: action=tapOn; target=Connect; input=None; expected=Connect/discovery page displayed
- tapOn: "Connect"

# Step 3: action=verify; target=Connect page; input=None; expected=Device search initiated
- assertVisible: "Searching for"
- assertVisible: "your device..."



