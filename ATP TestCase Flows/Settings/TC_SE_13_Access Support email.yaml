appId: com.kodaksmile
name: TC_SE_13_Access Support email
---
- launchApp:
    clearState: true
- waitForAnimationToEnd

# Load shared identifiers. This file must exist in ../../elements.
- runFlow: ../../elements/loadElements.yaml

# Common setup: skip account creation and reach onboarding/home path
- runFlow: ../../flows/I will do it later.yaml
- runFlow: ../../flows/Agree Term and Condition.yaml
- runFlow: ../../flows/permissionsFlow.yaml
- runFlow: ../../flows/Onboarding Welcome Screen.yaml
- runFlow:
    when:
      visible: "Swipe to continue"
    commands:
      - tapOn:
          point: "50%,50%"
      - waitForAnimationToEnd
      - swipe:
          start: "75%,55%"
          end: "15%,45%"
      - waitForAnimationToEnd
- runFlow: ../../flows/onboardingSkip.yaml

- waitForAnimationToEnd
- assertVisible: ${output.home.titleText}
- assertVisible:
    id: "settingImageView"
- tapOn:
    id: "settingImageView"

- waitForAnimationToEnd

# ATP steps for traceability: SE_13 - Access Support email
# Step 1: action=tapOn; target=Support; input=None; expected=Native email app opens
- tapOn: "Support"
- waitForAnimationToEnd

# Step 2: action=verify; target=Email To field; input=None; expected=To: Kodak@CAGlobal.com
- assertVisible: "From"
- waitForAnimationToEnd
- assertVisible: "To"
- waitForAnimationToEnd
# Step 3: action=tapOn; target=X / Back; input=None; expected=Returns to app
- tapOn: "Navigate up"
- waitForAnimationToEnd
- assertVisible: "Quick Tips"