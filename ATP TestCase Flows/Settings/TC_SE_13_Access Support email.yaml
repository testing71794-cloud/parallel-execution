appId: com.kodaksmile
name: TC_SE_13_Access Support email
---
- launchApp:
    clearState: false
- waitForAnimationToEnd
- runFlow:
    when:
      visible:
        text: "Rate App"
    commands:
      - tapOn: "No Thanks"
- waitForAnimationToEnd
- assertVisible:
    id: "settingImageView"
- tapOn:
    id: "settingImageView"

- waitForAnimationToEnd

# ATP steps for traceability: SE_13 - Access Support email
# Step 1: action=tapOn; target=Support; input=None; expected=Native email app opens
- tapOn: "Support"
- waitForAnimationToEnd

# Step 2: action=verify; target=Email To field; input=None; expected=To: Kodak@CAGlobal.com
- assertVisible: "From"
- waitForAnimationToEnd
- assertVisible: "To"
- waitForAnimationToEnd
# Step 3: action=tapOn; target=X / Back; input=None; expected=Returns to app
- tapOn:
    text: "Navigate up"
    optional: true
- back
- waitForAnimationToEnd
- launchApp:
    clearState: false
- waitForAnimationToEnd
- runFlow:
    when:
      notVisible: "Support"
    commands:
      - assertVisible:
          id: "settingImageView"
      - tapOn:
          id: "settingImageView"
      - waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Support"
    timeout: 15000
- assertVisible: "Support"
- assertVisible: "Quick Tips"