appId: com.kodaksmile
name: TC_SE_20_Access Sign Up from Settings
---
- launchApp:
    clearState: false
- waitForAnimationToEnd
- runFlow:
    when:
      visible:
        text: "Rate App"
    commands:
      - tapOn: "No Thanks"
- waitForAnimationToEnd
- assertVisible:
    id: "settingImageView"
- tapOn:
    id: "settingImageView"

- waitForAnimationToEnd

# ATP steps for traceability: SE_20 - Access Sign Up from Settings
# Step 1: action=tapOn; target=Sign Up Kodak Smile; input=None; expected=Sign up flow starts
- tapOn: "Sign up\nKODAK SMILE"
- waitForAnimationToEnd

# Step 2: action=verify; target=Sign up screen; input=None; expected=Sign up screen displayed
# Assert Sign Up Screen Elements

- assertVisible: "Full Name"
- assertVisible: "Email"
- assertVisible: "Password"
- assertVisible:
    text: "Date of birth"
    optional: true
- assertVisible: "Create Account"
- assertVisible: "I'll do it later"
- assertVisible: "Already have an account?"
- assertVisible: "Log In"

