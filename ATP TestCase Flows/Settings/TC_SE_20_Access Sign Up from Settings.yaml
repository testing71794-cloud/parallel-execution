appId: com.kodaksmile
name: TC_SE_20_Access Sign Up from Settings
---
- launchApp:
    clearState: true
- waitForAnimationToEnd

# Load shared identifiers. This file must exist in ../../elements.
- runFlow: ../../elements/loadElements.yaml

# Common setup: skip account creation and reach onboarding/home path
- runFlow: ../../flows/I will do it later.yaml
- runFlow: ../../flows/Agree Term and Condition.yaml
- runFlow: ../../flows/permissionsFlow.yaml
- runFlow: ../../flows/Onboarding Welcome Screen.yaml
- runFlow:
    when:
      visible: "Swipe to continue"
    commands:
      - tapOn:
          point: "50%,50%"
      - waitForAnimationToEnd
      - swipe:
          start: "75%,55%"
          end: "15%,45%"
      - waitForAnimationToEnd
- runFlow: ../../flows/onboardingSkip.yaml

- waitForAnimationToEnd
- assertVisible: ${output.home.titleText}
- assertVisible:
    id: "settingImageView"
- tapOn:
    id: "settingImageView"

- waitForAnimationToEnd

# ATP steps for traceability: SE_20 - Access Sign Up from Settings
# Step 1: action=tapOn; target=Sign Up Kodak Smile; input=None; expected=Sign up flow starts
- tapOn: "Sign up\nKODAK SMILE"
- waitForAnimationToEnd

# Step 2: action=verify; target=Sign up screen; input=None; expected=Sign up screen displayed
# Assert Sign Up Screen Elements

- assertVisible: "Full Name"
- assertVisible: "Email"
- assertVisible: "Password"
- assertVisible: "Date of birth"
- assertVisible: "Create Account"
- assertVisible: "I'll do it later"
- assertVisible: "Already have an account?"
- assertVisible: "Log In"

