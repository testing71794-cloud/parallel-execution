appId: com.kodaksmile
name: TC_SE_06_Quick Tips - Welcome to Kodak Smile
---
- launchApp:
    clearState: true
- waitForAnimationToEnd

# Load shared identifiers. This file must exist in ../../elements.
- runFlow: ../../elements/loadElements.yaml

# Common setup: skip account creation and reach onboarding/home path
- runFlow: ../../flows/I will do it later.yaml
- runFlow: ../../flows/Agree Term and Condition.yaml
- runFlow: ../../flows/permissionsFlow.yaml
- runFlow: ../../flows/Onboarding Welcome Screen.yaml
- runFlow:
    when:
      visible: "Swipe to continue"
    commands:
      - tapOn:
          point: "50%,50%"
      - waitForAnimationToEnd
      - swipe:
          start: "75%,55%"
          end: "15%,45%"
      - waitForAnimationToEnd
- runFlow: ../../flows/onboardingSkip.yaml

- waitForAnimationToEnd
- assertVisible: ${output.home.titleText}
- assertVisible:
    id: "settingImageView"
- tapOn:
    id: "settingImageView"

- waitForAnimationToEnd

# ATP steps for traceability: SE_06 - Quick Tips - Welcome to Kodak Smile
# Step 1: action=tapOn; target=Quick Tips; input=None; expected=Quick Tips page displayed
- tapOn: "Quick Tips"
- waitForAnimationToEnd
- tapOn: "Welcome to Kodak Smile"
- assertVisible: "Welcome"
- assertVisible: "Which device would you like to connect?"

# Step 2: action=tapOn; target=Welcome to Kodak Smile; input=None; expected=Onboarding flow starts
- waitForAnimationToEnd
- tapOn:
    point: 3%,27%

# Step 3: action=verify; target=Onboarding screen; input=None; expected=Onboarding screen displayed
- assertVisible: "started, let's connect"
- waitForAnimationToEnd
- tapOn:
    id: "backImageView"
- waitForAnimationToEnd
- assertVisible: "Welcome"


