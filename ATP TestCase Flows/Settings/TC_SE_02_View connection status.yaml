appId: com.kodaksmile
name: TC_SE_02_View connection status
---
- launchApp:
    clearState: true
- waitForAnimationToEnd

# Load shared identifiers. This file must exist in ../../elements.
- runFlow: ../../elements/loadElements.yaml

# Common setup: skip account creation and reach onboarding/home path
- runFlow: ../../flows/I will do it later.yaml
- runFlow: ../../flows/Agree Term and Condition.yaml
- runFlow: ../../flows/permissionsFlow.yaml
- runFlow: ../../flows/Onboarding Welcome Screen.yaml
- runFlow:
    when:
      visible: "Swipe to continue"
    commands:
      - tapOn:
          point: "50%,50%"
      - waitForAnimationToEnd
      - swipe:
          start: "75%,55%"
          end: "15%,45%"
      - waitForAnimationToEnd
- runFlow: ../../flows/onboardingSkip.yaml

- waitForAnimationToEnd
- assertVisible: ${output.home.titleText}
- assertVisible:
    id: "settingImageView"
- tapOn:
    id: "settingImageView"

- waitForAnimationToEnd

# ATP steps for traceability: SE_02 - View connection status
# Step 1: action=precondition; target=None; input=Printer/Camera connected; expected=Device connected
# Precondition: Printer/Camera connected

# Step 2: action=verify; target=Connection status; input=None; expected=Status shows 'Connected'
- runFlow:
    when:
      visible: "Connect"
    commands:
      - assertVisible: "Connect"

# Step 3: action=tapOn; target=Disconnect; input=None; expected=Device disconnected
- waitForAnimationToEnd

# Step 4: action=verify; target=Connection status; input=None; expected=Status shows 'Disconnected'
- runFlow:
    when:
      visible: "Disconnected"
    commands:
      - assertVisible: "Disconnected"
- assertVisible: "KODAK SMILE"
