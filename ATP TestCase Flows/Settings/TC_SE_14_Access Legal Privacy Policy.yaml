appId: com.kodaksmile
name: TC_SE_14_Access Legal Privacy Policy
---
- launchApp:
    clearState: true
- waitForAnimationToEnd

# Load shared identifiers. This file must exist in ../../elements.
- runFlow: ../../elements/loadElements.yaml

# Common setup: skip account creation and reach onboarding/home path
- runFlow: ../../flows/I will do it later.yaml
- runFlow: ../../flows/Agree Term and Condition.yaml
- runFlow: ../../flows/permissionsFlow.yaml
- runFlow: ../../flows/Onboarding Welcome Screen.yaml
- runFlow:
    when:
      visible: "Swipe to continue"
    commands:
      - tapOn:
          point: "50%,50%"
      - waitForAnimationToEnd
      - swipe:
          start: "75%,55%"
          end: "15%,45%"
      - waitForAnimationToEnd
- runFlow: ../../flows/onboardingSkip.yaml

- waitForAnimationToEnd
- assertVisible: ${output.home.titleText}
- assertVisible:
    id: "settingImageView"
- tapOn:
    id: "settingImageView"

- waitForAnimationToEnd

# ATP steps for traceability: SE_14 - Access Legal/Privacy Policy
# Step 1: action=tapOn; target=Legal; input=None; expected=Browser opens in-app
- tapOn: "Legal"
- waitForAnimationToEnd

# Step 2: action=verify; target=Website; input=None; expected=Kodak Photo Plus Privacy Policy displayed
- assertVisible: "Legal"
- assertVisible: "Photo Plus"
- scrollUntilVisible:
    element: "Information automatically collected"





