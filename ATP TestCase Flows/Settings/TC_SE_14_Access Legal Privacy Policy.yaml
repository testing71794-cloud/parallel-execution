appId: com.kodaksmile
name: TC_SE_14_Access Legal Privacy Policy
---
- launchApp:
    clearState: false
- waitForAnimationToEnd
- runFlow:
    when:
      visible:
        text: "Rate App"
    commands:
      - tapOn: "No Thanks"
- waitForAnimationToEnd
- assertVisible:
    id: "settingImageView"
- tapOn:
    id: "settingImageView"

- waitForAnimationToEnd

# ATP steps for traceability: SE_14 - Access Legal/Privacy Policy
# Step 1: action=tapOn; target=Legal; input=None; expected=Browser opens in-app
- tapOn: "Legal"
- waitForAnimationToEnd

# Step 2: action=verify; target=Website; input=None; expected=Kodak Photo Plus Privacy Policy displayed
- assertVisible: "Legal"
- assertVisible: "Photo Plus"
- scrollUntilVisible:
    element: "Payment Data."

- assertVisible: "Personal Information Provided by You."






