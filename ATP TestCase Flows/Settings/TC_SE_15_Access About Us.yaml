appId: com.kodaksmile
name: TC_SE_15_Access About Us
---
- launchApp:
    clearState: true
- waitForAnimationToEnd

# Load shared identifiers. This file must exist in ../../elements.
- runFlow: ../../elements/loadElements.yaml

# Common setup: skip account creation and reach onboarding/home path
- runFlow: ../../flows/I will do it later.yaml
- runFlow: ../../flows/Agree Term and Condition.yaml
- runFlow: ../../flows/permissionsFlow.yaml
- runFlow: ../../flows/Onboarding Welcome Screen.yaml
- runFlow:
    when:
      visible: "Swipe to continue"
    commands:
      - tapOn:
          point: "50%,50%"
      - waitForAnimationToEnd
      - swipe:
          start: "75%,55%"
          end: "15%,45%"
      - waitForAnimationToEnd
- runFlow: ../../flows/onboardingSkip.yaml

- waitForAnimationToEnd
- assertVisible: ${output.home.titleText}
- assertVisible:
    id: "settingImageView"
- tapOn:
    id: "settingImageView"

- waitForAnimationToEnd

# ATP steps for traceability: SE_15 - Access About Us
# Step 1: action=tapOn; target=About Us; input=None; expected=About Us screen displayed
- tapOn: "About Us"
- waitForAnimationToEnd

# Step 2: action=verify; target=About Us content; input=None; expected=C+A Global company information displayed
- assertVisible: "About Us :"
- assertVisible: "\n C+A Global is a leading international manufacturing and distribution company for consumer products. With a headquarter in Edison, New Jersey and other warehouses and offices around the globe, C+A Global works to provide high-quality, innovative products for consumers worldwide. Our company offers an ever-growing lineup of products, ranging from groundbreaking electronics to must-have home appliances. With our vast portfolio of brands, C+A Global designs, manufactures, and distributes housewares, pet supplies, storage equipment, outdoor gear, luxury devices, and so much more that exceeds the consumer\u2019s expectations."


# Step 3: action=tapOn; target=X (close); input=None; expected=Returns to Settings page
- tapOn:
    id: "linearLayoutBack"
- waitForAnimationToEnd
- assertVisible: "Legal"
- assertVisible: "About Us"

