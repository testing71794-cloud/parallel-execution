appId: com.kodaksmile
name: TC_SE_E02_Facebook login cancelled
---
- launchApp:
    clearState: false
- waitForAnimationToEnd
- runFlow:
    when:
      visible:
        text: "Rate App"
    commands:
      - tapOn: "No Thanks"
- waitForAnimationToEnd
- assertVisible:
    id: "settingImageView"
- tapOn:
    id: "settingImageView"

- waitForAnimationToEnd

# ATP steps for traceability: SE_E02 - Facebook login cancelled
# Step 1: action=navigateTo; target=Social Accounts; input=None; expected=Social Accounts displayed
# TODO: Map ATP action 'navigateTo' if this step is not already covered by reusable flows.

# Step 2: action=tapOn; target=Facebook Sign In; input=None; expected=Facebook login opens
- tapOn: "Social Accounts"
- waitForAnimationToEnd
- tapOn: "Sign in"
- waitForAnimationToEnd

# Step 3: action=inputText; target=Facebook email; input=test@email.com; expected=Email entered
- tapOn:
         text: "Continue as.*"
         optional: true
- waitForAnimationToEnd
# Step 6: action=verify; target=Social Accounts page; input=None; expected=Facebook shows 'Signed In'
- assertVisible: "Social Accounts"
- assertVisible: "FACEBOOK"
- assertVisible: "Sign out"
- waitForAnimationToEnd

# Step 3: action=tapOn; target=Cancel/Close; input=None; expected=Returns to app without login
- tapOn:
    id: "imageviewBack"
- waitForAnimationToEnd

# Step 4: action=verify; target=Facebook status; input=None; expected=Still shows 'Sign In'
- tapOn:
    id: "galleryImageView"
- waitForAnimationToEnd
- scrollUntilVisible:
    element: "FACEBOOK"
- waitForAnimationToEnd
- tapOn: "FACEBOOK"
- waitForAnimationToEnd
- assertVisible:
    text: "Select"
    optional: true
- waitForAnimationToEnd
