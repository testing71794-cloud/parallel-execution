appId: com.kodaksmile
name: TC_SE_01_Access Settings page
---
- launchApp:
    clearState: true
- waitForAnimationToEnd

# Load shared identifiers. This file must exist in ../../elements.
- runFlow: ../../elements/loadElements.yaml
# Common setup: skip account creation and reach onboarding/home path- waitForAnimationToEnd
- runFlow: ../../flows/I will do it later.yaml
- runFlow: ../../flows/Agree Term and Condition.yaml
- runFlow: ../../flows/permissionsFlow.yaml
- runFlow: ../../flows/Onboarding Welcome Screen.yaml
- runFlow:
    when:
      visible: "Swipe to continue"
    commands:
      - tapOn:
          point: "50%,50%"
      - waitForAnimationToEnd
      - swipe:
          start: "75%,55%"
          end: "15%,45%"
      - waitForAnimationToEnd
- runFlow: ../../flows/onboardingSkip.yaml

# ATP steps for traceability: SE_01 - Access Settings page
# Step 1: action=launchApp; target=None; input=None; expected=App launches to home screen
- waitForAnimationToEnd
- assertVisible: ${output.home.titleText}
# Step 2: action=tapOn; target=Settings icon; input=None; expected=Settings page displayed
- assertVisible:
    id: "settingImageView"
- tapOn:
    id: "settingImageView"

- waitForAnimationToEnd

# Step 3: action=verify; target=Settings page; input=None; expected=All settings options visible
- assertVisible: "Buy KODAK ZINK Photo Paper"
- assertVisible: "Quick Tips"
- assertVisible: "Support"
- assertVisible: "Legal"
- assertVisible: "About Us"
- assertVisible: "Social Accounts"

