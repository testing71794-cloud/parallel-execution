appId: com.kodaksmile
name: TC_SE_08_Quick Tips - Close printer connection
---
- launchApp:
    clearState: false
- waitForAnimationToEnd
- runFlow:
    when:
      visible:
        text: "Rate App"
    commands:
      - tapOn: "No Thanks"
- waitForAnimationToEnd
- assertVisible:
    id: "settingImageView"
- tapOn:
    id: "settingImageView"

- waitForAnimationToEnd
# ATP steps for traceability: SE_08 - Quick Tips - Close printer connection
# Step 1: action=tapOn; target=Quick Tips; input=None; expected=Quick Tips page displayed
- tapOn: "Quick Tips"
- waitForAnimationToEnd

# Step 2: action=tapOn; target=How to connect my printer; input=None; expected=Printer connection info screen
- tapOn: "How to connect my printer"
- waitForAnimationToEnd
- assertVisible: "How to connect\n your printer"
- waitForAnimationToEnd
# Step 3: action=tapOn; target=X (close); input=None; expected=Returns to Quick Tips page
- tapOn:
    id: "linearLayoutBack"

- waitForAnimationToEnd
- assertVisible: "Quick Tips"




