appId: com.kodaksmile
name: TC_SE_05_Access Quick Tips
---
- launchApp:
    clearState: true
- waitForAnimationToEnd

# Load shared identifiers. This file must exist in ../../elements.
- runFlow: ../../elements/loadElements.yaml

# Common setup: skip account creation and reach onboarding/home path
- runFlow: ../../flows/I will do it later.yaml
- runFlow: ../../flows/Agree Term and Condition.yaml
- runFlow: ../../flows/permissionsFlow.yaml
- runFlow: ../../flows/Onboarding Welcome Screen.yaml
- runFlow:
    when:
      visible: "Swipe to continue"
    commands:
      - tapOn:
          point: "50%,50%"
      - waitForAnimationToEnd
      - swipe:
          start: "75%,55%"
          end: "15%,45%"
      - waitForAnimationToEnd
- runFlow: ../../flows/onboardingSkip.yaml

- waitForAnimationToEnd
- assertVisible: ${output.home.titleText}
- assertVisible:
    id: "settingImageView"
- tapOn:
    id: "settingImageView"

- waitForAnimationToEnd

# ATP steps for traceability: SE_05 - Access Quick Tips
# Step 1: action=tapOn; target=Quick Tips; input=None; expected=Quick Tips page displayed
- tapOn: "Quick Tips"
- waitForAnimationToEnd

# Step 3: action=verify; target=Quick Tips page; input=None; expected=Load printer animation and options shown
- assertVisible: "Quick Tips"

# Step 3: action=tapOn; target=Back button; input=None; expected=Returns to Settings page
- tapOn:
    point: 1%,6%
- waitForAnimationToEnd
- assertVisible: "Buy KODAK ZINK Photo Paper"
- assertVisible: "Quick Tips"
- assertVisible: "Support"
- assertVisible: "Legal"
- assertVisible: "About Us"
- assertVisible: "Social Accounts"


