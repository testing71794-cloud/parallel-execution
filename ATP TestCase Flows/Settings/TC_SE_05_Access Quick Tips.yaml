appId: com.kodaksmile
name: TC_SE_05_Access Quick Tips
---
- launchApp:
    clearState: false
- waitForAnimationToEnd
- runFlow:
    when:
      visible:
        text: "Rate App"
    commands:
      - tapOn: "No Thanks"
- waitForAnimationToEnd
- assertVisible:
    id: "settingImageView"
- tapOn:
    id: "settingImageView"

- waitForAnimationToEnd

# ATP steps for traceability: SE_05 - Access Quick Tips
# Step 1: action=tapOn; target=Quick Tips; input=None; expected=Quick Tips page displayed
- tapOn: "Quick Tips"
- waitForAnimationToEnd

# Step 3: action=verify; target=Quick Tips page; input=None; expected=Load printer animation and options shown
- assertVisible: "Quick Tips"

# Step 3: action=tapOn; target=Back button; input=None; expected=Returns to Settings page
- tapOn:
    id: "linearLayoutBack"
    optional: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Buy KODAK ZINK Photo Paper"
    timeout: 15000
- assertVisible: "Buy KODAK ZINK Photo Paper"
- assertVisible: "Quick Tips"
- assertVisible: "Support"
- assertVisible: "Legal"
- assertVisible: "About Us"
- assertVisible: "Social Accounts"


