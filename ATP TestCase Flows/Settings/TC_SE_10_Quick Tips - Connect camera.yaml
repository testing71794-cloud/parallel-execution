appId: com.kodaksmile
name: TC_SE_10_Quick Tips - Connect camera
---
- launchApp:
    clearState: false
- waitForAnimationToEnd
- runFlow:
    when:
      visible:
        text: "Rate App"
    commands:
      - tapOn: "No Thanks"
- waitForAnimationToEnd
- assertVisible:
    id: "settingImageView"
- tapOn:
    id: "settingImageView"

- waitForAnimationToEnd

# ATP steps for traceability: SE_10 - Quick Tips - Connect camera
# Step 1: action=tapOn; target=Quick Tips; input=None; expected=Quick Tips page displayed
- tapOn: "Quick Tips"
- waitForAnimationToEnd

# Step 2: action=tapOn; target=How to connect my Camera; input=None; expected=Camera connection info screen
- tapOn: "How to connect my Camera"
- waitForAnimationToEnd

# Step 3: action=tapOn; target=Search Again; input=None; expected=Device search initiated
- tapOn: "Search Again"
- waitForAnimationToEnd

