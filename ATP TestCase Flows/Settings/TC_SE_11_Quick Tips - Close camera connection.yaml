appId: com.kodaksmile
name: TC_SE_11_Quick Tips - Close camera connection
---
- launchApp:
    clearState: false
- waitForAnimationToEnd
- runFlow:
    when:
      visible:
        text: "Rate App"
    commands:
      - tapOn: "No Thanks"
- waitForAnimationToEnd
- assertVisible:
    id: "settingImageView"
- tapOn:
    id: "settingImageView"

- waitForAnimationToEnd

# ATP steps for traceability: SE_11 - Quick Tips - Close camera connection
# Step 1: action=tapOn; target=Quick Tips; input=None; expected=Quick Tips page displayed
- tapOn: "Quick Tips"
- waitForAnimationToEnd

# Step 2: action=tapOn; target=How to connect my Camera; input=None; expected=Camera connection info screen
- tapOn: "How to connect my Camera"
- waitForAnimationToEnd
- runFlow:
    when:
      visible: "Search Again"
    commands:
      - tapOn: "Search Again"
      - waitForAnimationToEnd
      - assertVisible:
          text: "Hang tight, searching"
          optional: true
      - waitForAnimationToEnd
# Step 3: action=tapOn; target=X (close); input=None; expected=Returns to Quick Tips page
- tapOn:
    id: "backImageView"
- waitForAnimationToEnd
- tapOn:
    id: "linearLayoutBack"
- waitForAnimationToEnd
- assertVisible: "Quick Tips"
