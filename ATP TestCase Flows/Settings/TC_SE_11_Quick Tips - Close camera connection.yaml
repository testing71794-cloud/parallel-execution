appId: com.kodaksmile
name: TC_SE_11_Quick Tips - Close camera connection
---
- launchApp:
    clearState: true
- waitForAnimationToEnd

# Load shared identifiers. This file must exist in ../../elements.
- runFlow: ../../elements/loadElements.yaml

# Common setup: skip account creation and reach onboarding/home path
- runFlow: ../../flows/I will do it later.yaml
- runFlow: ../../flows/Agree Term and Condition.yaml
- runFlow: ../../flows/permissionsFlow.yaml
- runFlow: ../../flows/Onboarding Welcome Screen.yaml
- runFlow:
    when:
      visible: "Swipe to continue"
    commands:
      - tapOn:
          point: "50%,50%"
      - waitForAnimationToEnd
      - swipe:
          start: "75%,55%"
          end: "15%,45%"
      - waitForAnimationToEnd
- runFlow: ../../flows/onboardingSkip.yaml

- waitForAnimationToEnd
- assertVisible: ${output.home.titleText}
- assertVisible:
    id: "settingImageView"
- tapOn:
    id: "settingImageView"

- waitForAnimationToEnd

# ATP steps for traceability: SE_11 - Quick Tips - Close camera connection
# Step 1: action=tapOn; target=Quick Tips; input=None; expected=Quick Tips page displayed
- tapOn: "Quick Tips"
- waitForAnimationToEnd

# Step 2: action=tapOn; target=How to connect my Camera; input=None; expected=Camera connection info screen
- tapOn: "How to connect my Camera"
- waitForAnimationToEnd
- tapOn: "Search Again"
- waitForAnimationToEnd
- assertVisible: "Hang tight, searching\nfor your camera\u2026"
- waitForAnimationToEnd
# Step 3: action=tapOn; target=X (close); input=None; expected=Returns to Quick Tips page
- tapOn:
    id: "backImageView"
- waitForAnimationToEnd
- tapOn:
    id: "linearLayoutBack"
- waitForAnimationToEnd
- assertVisible: "Quick Tips"
