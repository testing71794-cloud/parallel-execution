appId: com.kodaksmile
name: TC_SE_18_Facebook Sign Out
---
- launchApp:
    clearState: true
- waitForAnimationToEnd

# Load shared identifiers. This file must exist in ../../elements.
- runFlow: ../../elements/loadElements.yaml

# Common setup: skip account creation and reach onboarding/home path
- runFlow: ../../flows/I will do it later.yaml
- runFlow: ../../flows/Agree Term and Condition.yaml
- runFlow: ../../flows/permissionsFlow.yaml
- runFlow: ../../flows/Onboarding Welcome Screen.yaml
- runFlow:
    when:
      visible: "Swipe to continue"
    commands:
      - tapOn:
          point: "50%,50%"
      - waitForAnimationToEnd
      - swipe:
          start: "75%,55%"
          end: "15%,45%"
      - waitForAnimationToEnd
- runFlow: ../../flows/onboardingSkip.yaml

- waitForAnimationToEnd
- assertVisible: ${output.home.titleText}
- assertVisible:
    id: "settingImageView"
- tapOn:
    id: "settingImageView"

- waitForAnimationToEnd

# ATP steps for traceability: SE_18 - Facebook Sign Out
# Step 1: action=precondition; target=None; input=Facebook signed in; expected=Already logged into Facebook
# Precondition: Facebook signed in

# Step 2: action=tapOn; target=Social Accounts; input=None; expected=Social Accounts screen displayed
- tapOn: "Social Accounts"
- waitForAnimationToEnd
- tapOn: "Sign in"
- waitForAnimationToEnd

# Step 3: action=inputText; target=Facebook email; input=test@email.com; expected=Email entered
- tapOn:
         text: "Continue as.*"
         optional: true
- waitForAnimationToEnd
# Step 6: action=verify; target=Social Accounts page; input=None; expected=Facebook shows 'Signed In'
- assertVisible: "Social Accounts"
- assertVisible: "FACEBOOK"
- assertVisible: "Sign out"
- waitForAnimationToEnd
# Step 4: action=verify; target=Facebook status; input=None; expected=Shows 'Sign In' option again
- tapOn: "Sign out"
- assertVisible: "Social Accounts"
- assertVisible: "FACEBOOK"
- assertVisible: "Sign in"

