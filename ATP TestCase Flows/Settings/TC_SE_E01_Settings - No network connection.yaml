appId: com.kodaksmile
name: TC_SE_E01_Settings - No network connection (automationAutomation is not feasible )
---
- launchApp:
    clearState: true
- waitForAnimationToEnd

# Load shared identifiers. This file must exist in ../../elements.
- runFlow: ../../elements/loadElements.yaml

# Common setup: skip account creation and reach onboarding/home path
- runFlow: ../../flows/I will do it later.yaml
- runFlow: ../../flows/Agree Term and Condition.yaml
- runFlow: ../../flows/permissionsFlow.yaml
- runFlow: ../../flows/Onboarding Welcome Screen.yaml
- runFlow:
    when:
      visible: "Swipe to continue"
    commands:
      - tapOn:
          point: "50%,50%"
      - waitForAnimationToEnd
      - swipe:
          start: "75%,55%"
          end: "15%,45%"
      - waitForAnimationToEnd
- runFlow: ../../flows/onboardingSkip.yaml

- waitForAnimationToEnd
- assertVisible: ${output.home.titleText}
- assertVisible:
    id: "settingImageView"
- tapOn:
    id: "settingImageView"

- waitForAnimationToEnd

# ATP steps for traceability: SE_E01 - Settings - No network connection
# Step 1: action=precondition; target=None; input=Disable network/WiFi; expected=No internet connection
# Precondition: Disable network/WiFi

# Step 2: action=tapOn; target=Buy KODAK ZINK Photo Paper; input=None; expected=Error or cached page shown
- tapOn: "Buy KODAK ZINK Photo Paper"
- waitForAnimationToEnd

