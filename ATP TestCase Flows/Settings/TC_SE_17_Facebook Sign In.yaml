appId: com.kodaksmile
name: TC_SE_17_Facebook Sign In
---
- launchApp:
    clearState: false
- waitForAnimationToEnd
- runFlow:
    when:
      visible:
        text: "Rate App"
    commands:
      - tapOn: "No Thanks"
- waitForAnimationToEnd
- assertVisible:
    id: "settingImageView"
- tapOn:
    id: "settingImageView"

- waitForAnimationToEnd

# ATP steps for traceability: SE_17 - Facebook Sign In
# Step 1: action=tapOn; target=Social Accounts; input=None; expected=Social Accounts screen displayed
- tapOn: "Social Accounts"
- waitForAnimationToEnd

# Step 2: action=tapOn; target=Facebook Sign In; input=None; expected=Facebook login browser opens
- tapOn: "Sign in"
- waitForAnimationToEnd

# Step 3: action=inputText; target=Facebook email; input=test@email.com; expected=Email entered
- runFlow:
    when:
      visible: "Continue"
    commands:
      - tapOn: "Continue"

- runFlow:
    when:
      visible: "Edit access"
    commands:
      - tapOn:
          text: "Continue as.*"
- runFlow:
    when:
      visible: "Continue as"
    commands:
      - tapOn:
          text: "Continue as.*"
          optional: true
- waitForAnimationToEnd:
    timeout: 2000
- runFlow:
    when:
      visible: "I already have a profile"
    commands:
      - tapOn: "I already have a profile"
- runFlow:
    when:
      visible:
        text: ".*(?i)(email or phone|mobile number or email|log in to facebook).*"
    commands:
      - tapOn:
          text: "Email"
          optional: true
      - tapOn:
          text: "Mobile number or email"
          optional: true
      - tapOn:
          text: "Email or phone"
          optional: true
      - inputText: "cplusadev@gmail.com"
      - tapOn:
          text: "Password"
          optional: true
      - inputText: "CAglobal@127"
      - tapOn:
          text: "Log in"
          optional: true
      - tapOn:
          text: "Log In"
          optional: true
      - waitForAnimationToEnd:
          timeout: 2000
- assertVisible: "FACEBOOK"
- assertVisible: "Sign out"

