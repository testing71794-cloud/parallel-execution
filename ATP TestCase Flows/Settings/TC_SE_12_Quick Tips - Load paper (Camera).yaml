appId: com.kodaksmile
name: TC_SE_12_Quick Tips - Load paper (Camera)
---
- launchApp:
    clearState: true
- waitForAnimationToEnd

# Load shared identifiers. This file must exist in ../../elements.
- runFlow: ../../elements/loadElements.yaml

# Common setup: skip account creation and reach onboarding/home path
- runFlow: ../../flows/I will do it later.yaml
- runFlow: ../../flows/Agree Term and Condition.yaml
- runFlow: ../../flows/permissionsFlow.yaml
- runFlow: ../../flows/Onboarding Welcome Screen.yaml
- runFlow:
    when:
      visible: "Swipe to continue"
    commands:
      - tapOn:
          point: "50%,50%"
      - waitForAnimationToEnd
      - swipe:
          start: "75%,55%"
          end: "15%,45%"
      - waitForAnimationToEnd
- runFlow: ../../flows/onboardingSkip.yaml

- waitForAnimationToEnd
- assertVisible: ${output.home.titleText}
- assertVisible:
    id: "settingImageView"
- tapOn:
    id: "settingImageView"

- waitForAnimationToEnd

# ATP steps for traceability: SE_12 - Quick Tips - Load paper (Camera)
# Step 1: action=tapOn; target=Quick Tips; input=None; expected=Quick Tips page displayed
- tapOn: "Quick Tips"
- waitForAnimationToEnd

# Step 2: action=tapOn; target=How to Load Kodak Zink Photo Paper; input=None; expected=Paper loading animation for Smile Camera
# Step 2: action=tapOn; target=How to Load Kodak Zink Photo Paper; input=None; expected=Paper loading animation for Smile Printer
- tapOn:
    id: "zinkPaperCameraLinearLayout"
- waitForAnimationToEnd

# Step 3: action=verify; target=Animation; input=None; expected=Printer paper loading instructions shown
- assertVisible: "Load your camera"
- assertVisible: "KODAK ZINK"
- assertVisible: "Photo Paper"

# Step 4: action=tapOn; target=Back button; input=None; expected=Returns to previous page
- tapOn:
    id: "backImageView"

- waitForAnimationToEnd
- assertVisible: "Quick Tips"

