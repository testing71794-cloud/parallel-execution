appId: com.kodaksmile
name: TC_SE_04_Access Buy KODAK paper link
---
- launchApp:
    clearState: true
- waitForAnimationToEnd

# Load shared identifiers. This file must exist in ../../elements.
- runFlow: ../../elements/loadElements.yaml

# Common setup: skip account creation and reach onboarding/home path
- runFlow: ../../flows/I will do it later.yaml
- runFlow: ../../flows/Agree Term and Condition.yaml
- runFlow: ../../flows/permissionsFlow.yaml
- runFlow: ../../flows/Onboarding Welcome Screen.yaml
- runFlow:
    when:
      visible: "Swipe to continue"
    commands:
      - tapOn:
          point: "50%,50%"
      - waitForAnimationToEnd
      - swipe:
          start: "75%,55%"
          end: "15%,45%"
      - waitForAnimationToEnd
- runFlow: ../../flows/onboardingSkip.yaml

- waitForAnimationToEnd
- assertVisible: ${output.home.titleText}
- assertVisible:
    id: "settingImageView"
- tapOn:
    id: "settingImageView"

- waitForAnimationToEnd

# ATP steps for traceability: SE_04 - Access Buy KODAK paper link
# Step 1: action=tapOn; target=Buy KODAK ZINK Photo Paper; input=None; expected=Browser opens in-app
- tapOn: "Buy KODAK ZINK Photo Paper"
- waitForAnimationToEnd

# Step 2: action=verify; target=Amazon page; input=None; expected=Amazon listing for Kodak Zink paper displayed
# Page header / webview indicator
- assertVisible: "amazon.in"

# Search bar (very stable)
- assertVisible: "Search Amazon.in"

# Product brand
- assertVisible: "KODAK"

# Product title (partial match safer)
- assertVisible: "Kodak Premium Zink Photo Paper"





