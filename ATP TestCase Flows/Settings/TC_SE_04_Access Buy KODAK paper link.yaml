appId: com.kodaksmile
name: TC_SE_04_Access Buy KODAK paper link
---
- launchApp:
    clearState: false
- waitForAnimationToEnd
- runFlow:
    when:
      visible:
        text: "Rate App"
    commands:
      - tapOn: "No Thanks"
- waitForAnimationToEnd
- assertVisible:
    id: "settingImageView"
- tapOn:
    id: "settingImageView"

- waitForAnimationToEnd
# ATP steps for traceability: SE_04 - Access Buy KODAK paper link
# Step 1: action=tapOn; target=Buy KODAK ZINK Photo Paper; input=None; expected=Browser opens in-app
- tapOn: "Buy KODAK ZINK Photo Paper"
- waitForAnimationToEnd

# Step 2: action=verify; target=Amazon page; input=None; expected=Amazon listing for Kodak Zink paper displayed
# Page header / webview indicator
- assertVisible: "amazon.in"
# Product brand (webview may vary by region/network)
- assertVisible:
    text: "KODAK"
    optional: true

# Product title (listing varies by region/network)
- assertVisible:
    text: "Zink Photo Paper"
    optional: true





