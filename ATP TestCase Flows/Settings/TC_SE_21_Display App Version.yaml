appId: com.kodaksmile
name: TC_SE_21_Display App Version
---
- launchApp:
    clearState: false
- waitForAnimationToEnd
- runFlow:
    when:
      visible:
        text: "Rate App"
    commands:
      - tapOn: "No Thanks"
- waitForAnimationToEnd
- assertVisible:
    id: "settingImageView"
- tapOn:
    id: "settingImageView"

- waitForAnimationToEnd

# ATP steps for traceability: SE_21 - Display App Version
# Step 1: action=verify; target=App version; input=None; expected=Version number visible at bottom right
- runFlow:
    when:
      visible: "Version\n1.87"
    commands:
      - assertVisible: "Version\n1.87"

