appId: com.kodaksmile
name: TC_SE_16_Access Social Accounts
---
- launchApp:
    clearState: false
- waitForAnimationToEnd
- runFlow:
    when:
      visible:
        text: "Rate App"
    commands:
      - tapOn: "No Thanks"
- waitForAnimationToEnd
- assertVisible:
    id: "settingImageView"
- tapOn:
    id: "settingImageView"

- waitForAnimationToEnd

# ATP steps for traceability: SE_16 - Access Social Accounts
# Step 1: action=tapOn; target=Social Accounts; input=None; expected=Social Accounts screen displayed
- tapOn: "Social Accounts"
- waitForAnimationToEnd

# Step 2: action=verify; target=Social options; input=None; expected=Facebook sign in option visible
- assertVisible: "Social Accounts"
- assertVisible: "FACEBOOK"
- assertVisible: "Sign in"





