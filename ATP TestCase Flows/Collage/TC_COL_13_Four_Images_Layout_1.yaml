appId: com.kodaksmile
name: TC_COL_13_Four_Images_Layout_1
---
# Complete journey: gallery (All Photos) -> select 4 photo(s) -> Collage -> layout 1 -> Adjust Layout -> Save.
# Assumes footer on Select Layout reads "N Items selected" for N>1; adjust if the app differs.
- launchApp:
    clearState: false
- waitForAnimationToEnd
- runFlow: ../../elements/loadElements.yaml
- runFlow: ../../flows/collage_gallery_start.yaml
- tapOn: "All Photos"
- waitForAnimationToEnd
- assertVisible: "All Photos"
- assertVisible: "Select"
- runFlow:
    when:
      visible: "Select"
    commands:
      - tapOn: "Select"
      - waitForAnimationToEnd
- runFlow:
    when:
      notVisible: "Select Items"
    commands:
      - tapOn:
          id: textViewSelect
      - waitForAnimationToEnd
- assertVisible: "Select Items"
- assertVisible: "Collage"
- waitForAnimationToEnd
- tapOn:
    id: imageViewPhoto
    index: 0
- waitForAnimationToEnd
- tapOn:
    id: imageViewPhoto
    index: 1
- waitForAnimationToEnd
- tapOn:
    id: imageViewPhoto
    index: 2
- waitForAnimationToEnd
- tapOn:
    id: imageViewPhoto
    index: 3
- waitForAnimationToEnd
- tapOn: "Collage"
- waitForAnimationToEnd
- assertVisible: "Select Layout"
- assertVisible: "4 Items selected"
# Collage layout slot 1 (resource id layoutTwoHImage2).
- tapOn:
    id: "layoutTwoHImage2"
- waitForAnimationToEnd
- assertVisible: "Select Layout"
- assertVisible: "Next"
- assertVisible: "4 Items selected"
- tapOn: "Next"
- waitForAnimationToEnd
- assertVisible: "Adjust Layout"
- assertVisible: "Replace Image"
- assertVisible: "Save"
- waitForAnimationToEnd
- tapOn: "Save"
- waitForAnimationToEnd
- runFlow:
    when:
      visible: "Save Photo?"
    commands:
      - tapOn: "Save"
      - waitForAnimationToEnd
- assertVisible: "KODAK SMILE"
- assertVisible: "All Photos"
