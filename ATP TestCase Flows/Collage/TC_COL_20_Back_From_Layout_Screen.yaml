appId: com.kodaksmile
name: TC_COL_20_Back_From_Layout_Screen
---
# Complete journey: Select Layout -> system back -> Select Items.
- launchApp:
    clearState: false
- waitForAnimationToEnd
- runFlow: ../../elements/loadElements.yaml
- runFlow: ../../flows/collage_gallery_start.yaml
- tapOn: "All Photos"
- waitForAnimationToEnd
- assertVisible: "All Photos"
- assertVisible: "Select"
- runFlow:
    when:
      visible: "Select"
    commands:
      - tapOn: "Select"
      - waitForAnimationToEnd
- runFlow:
    when:
      notVisible: "Select Items"
    commands:
      - tapOn:
          id: textViewSelect
      - waitForAnimationToEnd
- assertVisible: "Select Items"
- assertVisible: "Collage"
- waitForAnimationToEnd
- tapOn:
    id: imageViewPhoto
    index: 0
- waitForAnimationToEnd
- tapOn: "Collage"
- waitForAnimationToEnd
- assertVisible: "Select Layout"
- assertVisible: "1 Item selected"
# Collage layout slot 1 (resource id layoutTwoHImage2).
- tapOn:
    id: "layoutTwoHImage2"
- waitForAnimationToEnd
- tapOn:
    id: "linearLayoutBack"
    optional: true
- waitForAnimationToEnd
- runFlow:
    when:
      notVisible: "Select Items"
    commands:
      - back
      - waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Select Items"
    timeout: 15000
- assertVisible: "Select Items"
- assertVisible: "Collage"
