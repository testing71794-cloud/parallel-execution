appId: com.kodaksmile
name: TC_COL_17_No_Image_Selected
---
# Complete journey: gallery (All Photos) -> Select mode -> Collage with zero photos.
- launchApp:
    clearState: false
- waitForAnimationToEnd
- runFlow: ../../elements/loadElements.yaml
- runFlow: ../../flows/collage_gallery_start.yaml
- tapOn: "All Photos"
- waitForAnimationToEnd
- assertVisible: "All Photos"
- assertVisible: "Select"
- runFlow:
    when:
      visible: "Select"
    commands:
      - tapOn: "Select"
      - waitForAnimationToEnd
- runFlow:
    when:
      notVisible: "Select Items"
    commands:
      - tapOn:
          id: textViewSelect
      - waitForAnimationToEnd
- assertVisible: "Select Items"
- assertVisible: "Collage"
- waitForAnimationToEnd
# With zero photos selected, Collage must not open Select Layout.
# Toast is transient ("Please select atleast one image" / "...for collage"); assert screen stays put.
- tapOn: "Collage"
- runFlow:
    when:
      visible: "Please select atleast one image"
    commands:
      - assertVisible: "Please select atleast one image"
- runFlow:
    when:
      visible: "Please select atleast one image."
    commands:
      - assertVisible: "Please select atleast one image."
- runFlow:
    when:
      visible: "Select atleast one image for collage"
    commands:
      - assertVisible: "Select atleast one image for collage"
- waitForAnimationToEnd
- assertVisible: "Select Items"
- assertVisible: "Collage"
- assertNotVisible: "Select Layout"
