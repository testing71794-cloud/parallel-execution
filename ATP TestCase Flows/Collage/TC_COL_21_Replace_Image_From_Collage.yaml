appId: com.kodaksmile
name: TC_COL_21_Replace_Image_From_Collage
---
# Adjust Layout -> Replace Image -> pick replacement -> back on Adjust Layout.
- launchApp:
    clearState: true
- waitForAnimationToEnd
- runFlow: ../../elements/loadElements.yaml
- waitForAnimationToEnd
- runFlow: ../../flows/I will do it later.yaml
- waitForAnimationToEnd
- runFlow: ../../flows/Agree Term and Condition.yaml
- waitForAnimationToEnd
- runFlow: ../../flows/permissionsFlow.yaml
- waitForAnimationToEnd
- runFlow: ../../flows/Onboarding Welcome Screen.yaml
- waitForAnimationToEnd
- runFlow:
    when:
      visible: "Swipe to continue"
    commands:
      - tapOn:
          point: "50%,50%"
      - waitForAnimationToEnd
      - swipe:
          start: "75%,55%"
          end: "15%,45%"
      - waitForAnimationToEnd
- runFlow: ../../flows/onboardingSkip.yaml
- waitForAnimationToEnd
- runFlow:
    when:
      visible: "Go to homepage"
    commands:
      - tapOn: "Go to homepage"
      - waitForAnimationToEnd
- extendedWaitUntil:
    visible: "KODAK SMILE"
    timeout: 25000
- assertVisible: "KODAK SMILE"
- assertVisible: ${output.home.titleText}
- waitForAnimationToEnd
- runFlow:
    when:
      visible: "Allow KODAK SMILE to access photos"
    commands:
      - tapOn: "Allow"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: "Photos Access Required"
    commands:
      - tapOn: "Ok"
      - waitForAnimationToEnd
- tapOn: "All Photos"
- waitForAnimationToEnd
- assertVisible: "All Photos"
- assertVisible: "Select"
- runFlow:
    when:
      visible: "Select"
    commands:
      - tapOn: "Select"
      - waitForAnimationToEnd
- runFlow:
    when:
      notVisible: "Select Items"
    commands:
      - tapOn:
          id: textViewSelect
      - waitForAnimationToEnd
- assertVisible: "Select Items"
- assertVisible: "Collage"
- waitForAnimationToEnd
- tapOn:
    id: imageViewPhoto
    index: 0
- waitForAnimationToEnd
- tapOn: "Collage"
- waitForAnimationToEnd
- assertVisible: "Select Layout"
- assertVisible: "1 Item selected"
- tapOn:
    id: "layoutTwoHImage2"
- waitForAnimationToEnd
- assertVisible: "Next"
- tapOn: "Next"
- waitForAnimationToEnd
- assertVisible: "Adjust Layout"
- assertVisible: "Replace Image"
- assertVisible: "Save"
# Tap collage image so Replace Image is actionable, then open picker.
- tapOn:
    point: "50%,35%"
- waitForAnimationToEnd
- tapOn: "Replace Image"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: "Done|Select Items|All Photos"
    timeout: 15000
- runFlow:
    when:
      visible: "Done"
    commands:
      - tapOn:
          id: imageViewPhoto
          index: 1
      - waitForAnimationToEnd
      - tapOn: "Done"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: "Select Items"
    commands:
      - tapOn:
          id: imageViewPhoto
          index: 1
      - waitForAnimationToEnd
      - runFlow:
          when:
            visible: "Done"
          commands:
            - tapOn: "Done"
            - waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Adjust Layout"
    timeout: 15000
- assertVisible: "Adjust Layout"
- assertVisible: "Replace Image"
- assertVisible: "Save"
