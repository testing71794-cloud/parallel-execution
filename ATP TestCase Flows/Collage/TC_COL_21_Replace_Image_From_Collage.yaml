appId: com.kodaksmile
name: TC_COL_21_Replace_Image_From_Collage
---
# Adjust Layout -> Replace Image -> pick replacement -> back on Adjust Layout.
- launchApp:
    clearState: false
- waitForAnimationToEnd
- runFlow: ../../elements/loadElements.yaml
- runFlow: ../../flows/collage_gallery_start.yaml
- tapOn: "All Photos"
- waitForAnimationToEnd
- assertVisible: "All Photos"
- assertVisible: "Select"
- runFlow:
    when:
      visible: "Select"
    commands:
      - tapOn: "Select"
      - waitForAnimationToEnd
- runFlow:
    when:
      notVisible: "Select Items"
    commands:
      - tapOn:
          id: textViewSelect
      - waitForAnimationToEnd
- assertVisible: "Select Items"
- assertVisible: "Collage"
- waitForAnimationToEnd
- tapOn:
    id: imageViewPhoto
    index: 0
- waitForAnimationToEnd
- tapOn: "Collage"
- waitForAnimationToEnd
- assertVisible: "Select Layout"
- assertVisible: "1 Item selected"
- tapOn:
    id: "layoutTwoHImage2"
- waitForAnimationToEnd
- assertVisible: "Next"
- tapOn: "Next"
- waitForAnimationToEnd
- assertVisible: "Adjust Layout"
- assertVisible: "Replace Image"
- assertVisible: "Save"
# Tap collage image so Replace Image is actionable, then open picker.
- tapOn:
    point: "50%,35%"
- waitForAnimationToEnd
- tapOn: "Replace Image"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: "Done|Select Items|All Photos"
    timeout: 15000
- runFlow:
    when:
      visible: "Done"
    commands:
      - tapOn:
          id: imageViewPhoto
          index: 1
      - waitForAnimationToEnd
      - tapOn: "Done"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: "Select Items"
    commands:
      - tapOn:
          id: imageViewPhoto
          index: 1
      - waitForAnimationToEnd
      - runFlow:
          when:
            visible: "Done"
          commands:
            - tapOn: "Done"
            - waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Adjust Layout"
    timeout: 15000
- assertVisible: "Adjust Layout"
- assertVisible: "Replace Image"
- assertVisible: "Save"
