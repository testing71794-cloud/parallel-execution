appId: com.kodaksmile
name: TC_PR_04_Print collage photo
---
- launchApp:
    clearState: true
- waitForAnimationToEnd

# Load shared identifiers. This file must exist in ../../elements.
- runFlow: ../../elements/loadElements.yaml

# Common setup: skip account creation and reach onboarding/home path
- runFlow: ../../flows/I will do it later.yaml
- runFlow: ../../flows/Agree Term and Condition.yaml
- runFlow: ../../flows/Onboarding Welcome Screen.yaml
- runFlow: ../../flows/Swipe to continue.yaml
- runFlow: ../../flows/permissionsFlow.yaml

# Printing validation using existing reusable print path
- runFlow: ../../flows/findAndConnectPrinter.yaml
- runFlow: ../../flows/PrintMyFirstImage.yaml
- runFlow: ../../flows/waitForPrinting.yaml

# ATP steps for traceability: PR_04 - Print collage photo
# Step 1: action=precondition; target=None; input=Printer connected, paper loaded; expected=Printer ready
# Precondition: Printer connected, paper loaded

# Step 2: action=tapOn; target=Album; input=None; expected=Album opens
- tapOn: "Album"
- waitForAnimationToEnd

# Step 3: action=tapOn; target=Select; input=None; expected=Multi-select mode enabled
- tapOn: "Select"
- waitForAnimationToEnd

# Step 4: action=tapOn; target=Photo 1; input=None; expected=Photo selected
- tapOn: "Photo 1"
- waitForAnimationToEnd

# Step 5: action=tapOn; target=Collage; input=None; expected=Collage layout options shown
- tapOn: "Collage"
- waitForAnimationToEnd

# Step 6: action=tapOn; target=Layout option; input=None; expected=Layout selected
- tapOn: "Layout option"
- waitForAnimationToEnd

# Step 7: action=tapOn; target=Next; input=None; expected=Collage preview shown
- tapOn: "Next"
- waitForAnimationToEnd

# Step 8: action=tapOn; target=Save; input=None; expected=Collage saved to gallery
- tapOn: "Save"
- waitForAnimationToEnd

# Step 9: action=tapOn; target=Album; input=None; expected=Album opens
- tapOn: "Album"
- waitForAnimationToEnd

# Step 10: action=tapOn; target=Collage photo; input=None; expected=Collage preview displayed
- tapOn: "Collage photo"
- waitForAnimationToEnd

# Step 11: action=tapOn; target=Close overlay; input=None; expected=Overlay dismissed
- tapOn: "Close overlay"
- waitForAnimationToEnd

# Step 12: action=tapOn; target=Print; input=None; expected=Print preview shown
- tapOn: "Print"
- waitForAnimationToEnd

# Step 13: action=tapOn; target=Print; input=None; expected=Print job started
- tapOn: "Print"
- waitForAnimationToEnd

# Step 14: action=waitFor; target=Print completion; input=60 seconds; expected=Collage printed successfully
# TODO: Map ATP action 'waitFor' if this step is not already covered by reusable flows.

