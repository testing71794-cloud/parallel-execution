appId: com.kodaksmile
name: TC_COL_19_Change_Layout_Before_Next
---
# Complete journey: layout 2 then layout 1 before Next; finish save.
- launchApp:
    clearState: false
- waitForAnimationToEnd
- runFlow: ../../elements/loadElements.yaml
- runFlow: ../../flows/collage_gallery_start.yaml
- tapOn: "All Photos"
- waitForAnimationToEnd
- assertVisible: "All Photos"
- assertVisible: "Select"
- runFlow:
    when:
      visible: "Select"
    commands:
      - tapOn: "Select"
      - waitForAnimationToEnd
- runFlow:
    when:
      notVisible: "Select Items"
    commands:
      - tapOn:
          id: textViewSelect
      - waitForAnimationToEnd
- assertVisible: "Select Items"
- assertVisible: "Collage"
- waitForAnimationToEnd
- tapOn:
    id: imageViewPhoto
    index: 0
- waitForAnimationToEnd
- tapOn: "Collage"
- waitForAnimationToEnd
- assertVisible: "Select Layout"
- assertVisible: "1 Item selected"
# Collage layout slot 2 (resource id layoutTwoVImage2).
- tapOn:
    id: "layoutTwoVImage2"
- waitForAnimationToEnd
# Collage layout slot 1 (resource id layoutTwoHImage2).
- tapOn:
    id: "layoutTwoHImage2"
- waitForAnimationToEnd
- assertVisible: "Select Layout"
- assertVisible: "Next"
- assertVisible: "1 Item selected"
- tapOn: "Next"
- waitForAnimationToEnd
- assertVisible: "Adjust Layout"
- assertVisible: "Replace Image"
- assertVisible: "Save"
- waitForAnimationToEnd
- tapOn: "Save"
- waitForAnimationToEnd
- runFlow:
    when:
      visible: "Save Photo?"
    commands:
      - tapOn: "Save"
      - waitForAnimationToEnd
- assertVisible: "KODAK SMILE"
- assertVisible: "All Photos"
