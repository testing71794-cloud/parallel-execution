appId: com.kodaksmile
name: TC_CO_04_Connect via print preview
---
- launchApp:
    clearState: true
- waitForAnimationToEnd

# Load shared identifiers. This file must exist in ../../elements.
- runFlow: ../../elements/loadElements.yaml

# Common setup: skip account creation and reach onboarding/home path
- runFlow: ../../flows/I will do it later.yaml
- runFlow: ../../flows/Agree Term and Condition.yaml
- runFlow: ../../flows/Onboarding Welcome Screen.yaml
- runFlow: ../../flows/Swipe to continue.yaml
- runFlow: ../../flows/permissionsFlow.yaml

# Connection validation using existing reusable printer connection flow
- runFlow: ../../flows/findAndConnectPrinter.yaml
- runFlow: ../../flows/handleBluetoothPairing.yaml

# ATP steps for traceability: CO_04 - Connect via print preview
# Step 1: action=launchApp; target=None; input=None; expected=App launches successfully
- waitForAnimationToEnd

# Step 2: action=precondition; target=None; input=No device connected; expected=No printer/camera connected
# Precondition: No device connected

# Step 3: action=tapOn; target=Album; input=None; expected=Album opens
- tapOn: "Album"
- waitForAnimationToEnd

# Step 4: action=tapOn; target=Photo; input=None; expected=Photo preview displayed
- tapOn: "Photo"
- waitForAnimationToEnd

# Step 5: action=tapOn; target=Print; input=None; expected=Connection window appears
- tapOn: "Print"
- waitForAnimationToEnd

# Step 6: action=waitFor; target=Device list; input=10 seconds; expected=Available devices listed
# TODO: Map ATP action 'waitFor' if this step is not already covered by reusable flows.

# Step 7: action=tapOn; target=Connect; input=None; expected=Device connected, print ready
- tapOn: "Connect"
- waitForAnimationToEnd

