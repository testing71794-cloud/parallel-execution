appId: com.kodaksmile
name: TC_CO_01_Connect via onboarding
---
- launchApp:
    clearState: true
- waitForAnimationToEnd

# Load shared identifiers. This file must exist in ../../elements.
- runFlow: ../../elements/loadElements.yaml

# Common setup: skip account creation and reach onboarding/home path
- runFlow: ../../flows/I will do it later.yaml
- runFlow: ../../flows/Agree Term and Condition.yaml
- runFlow: ../../flows/Onboarding Welcome Screen.yaml
- runFlow: ../../flows/Swipe to continue.yaml
- runFlow: ../../flows/permissionsFlow.yaml

# Connection validation using existing reusable printer connection flow
- runFlow: ../../flows/findAndConnectPrinter.yaml
- runFlow: ../../flows/handleBluetoothPairing.yaml

# ATP steps for traceability: CO_01 - Connect via onboarding
# Step 1: action=launchApp; target=None; input=None; expected=App launches successfully
- waitForAnimationToEnd

# Step 2: action=tapOn; target=I'll do it later; input=None; expected=Terms screen appears
- tapOn: "I'll do it later"
- waitForAnimationToEnd

# Step 3: action=tapOn; target=Terms checkbox; input=None; expected=Checkbox selected
- runFlow:
    when:
      visible: "Agree Terms and Conditions"
    commands:
      - tapOn: "Agree Terms and Conditions"
      - waitForAnimationToEnd

# Step 4: action=tapOn; target=Continue; input=None; expected=Welcome screen displayed
# Covered by reusable flow or requires app-specific selector: Continue

# Step 5: action=tapOn; target=Find My Printer; input=None; expected=Search screen shown
- tapOn: "Find My Printer"
- waitForAnimationToEnd

# Step 6: action=tapOn; target=Allow; input=None; expected=Permissions granted
- tapOn: "Allow"
- waitForAnimationToEnd

# Step 7: action=waitFor; target=Device list; input=10 seconds; expected=Devices listed
# TODO: Map ATP action 'waitFor' if this step is not already covered by reusable flows.

# Step 8: action=tapOn; target=Connect; input=None; expected=Device connected successfully
- tapOn: "Connect"
- waitForAnimationToEnd

