appId: com.kodaksmile
name: TC_CO_E04_Device powered off during use
---
- launchApp:
    clearState: true
- waitForAnimationToEnd

# Load shared identifiers. This file must exist in ../../elements.
- runFlow: ../../elements/loadElements.yaml

# Common setup: skip account creation and reach onboarding/home path
- runFlow: ../../flows/I will do it later.yaml
- runFlow: ../../flows/Agree Term and Condition.yaml
- runFlow: ../../flows/Onboarding Welcome Screen.yaml
- runFlow: ../../flows/Swipe to continue.yaml
- runFlow: ../../flows/permissionsFlow.yaml

# Connection validation using existing reusable printer connection flow
- runFlow: ../../flows/findAndConnectPrinter.yaml
- runFlow: ../../flows/handleBluetoothPairing.yaml

# ATP steps for traceability: CO_E04 - Device powered off during use
# Step 1: action=precondition; target=None; input=Device connected; expected=Device is connected
# Precondition: Device connected

# Step 2: action=externalAction; target=Physical device; input=Power off device; expected=Device turns off
# TODO: Map ATP action 'externalAction' if this step is not already covered by reusable flows.

# Step 3: action=verify; target=Connection status; input=None; expected=Status updates to 'Disconnected'
- runFlow:
    when:
      visible: "Connection status"
    commands:
      - assertVisible: "Connection status"

