appId: com.kodaksmile
name: TC_CO_E01_Disconnect device
---
- launchApp:
    clearState: true
- waitForAnimationToEnd

# Load shared identifiers. This file must exist in ../../elements.
- runFlow: ../../elements/loadElements.yaml

# Common setup: skip account creation and reach onboarding/home path
- runFlow: ../../flows/I will do it later.yaml
- runFlow: ../../flows/Agree Term and Condition.yaml
- runFlow: ../../flows/Onboarding Welcome Screen.yaml
- runFlow: ../../flows/Swipe to continue.yaml
- runFlow: ../../flows/permissionsFlow.yaml

# Connection validation using existing reusable printer connection flow
- runFlow: ../../flows/findAndConnectPrinter.yaml
- runFlow: ../../flows/handleBluetoothPairing.yaml

# ATP steps for traceability: CO_E01 - Disconnect device
# Step 1: action=precondition; target=None; input=Device connected; expected=Printer or camera is connected
# Precondition: Device connected

# Step 2: action=tapOn; target=Settings icon; input=None; expected=Settings page displayed
- tapOn: "Settings icon"
- waitForAnimationToEnd

# Step 3: action=verify; target=Connection status; input=None; expected=Status shows 'Connected'
- runFlow:
    when:
      visible: "Connection status"
    commands:
      - assertVisible: "Connection status"

# Step 4: action=tapOn; target=Disconnect; input=None; expected=Device disconnected
- tapOn: "Disconnect"
- waitForAnimationToEnd

# Step 5: action=verify; target=Connection status; input=None; expected=Status shows 'Disconnected'
- runFlow:
    when:
      visible: "Connection status"
    commands:
      - assertVisible: "Connection status"

