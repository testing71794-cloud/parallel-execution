
appId: com.kodaksmile
name: Flow9 - Collage -> Home 
---
- launchApp:
    clearState: true
- waitForAnimationToEnd
- runFlow: ../elements/loadElements.yaml

# ---- Common onboarding/permissions ----
- runFlow: ../flows/I will do it later.yaml
- runFlow: ../flows/Agree Term and Condition.yaml
- runFlow: ../flows/permissionsFlow.yaml
- runFlow: ../flows/Onboarding Welcome Screen.yaml

# Swipe intro if present
- runFlow:
    when:
      visible: "Swipe to continue"
    commands:
      - tapOn:
          point: "50%,50%"
      - waitForAnimationToEnd
      - swipe:
          start: "75%,55%"
          end: "15%,45%"
      - waitForAnimationToEnd

- runFlow: ../flows/onboardingSkip.yaml

# ---- Home ----
- waitForAnimationToEnd
- assertVisible: ${output.home.titleText}

- runFlow: ../flows/openAlbum.yaml

# Open Collage
- tapOn: Select
- waitForAnimationToEnd

# ---------------- SELECT ITEMS ----------------
- assertVisible: "Select Items"
- waitForAnimationToEnd

# Select 4 photos (exact behaviour from video)
- tapOn:
    point: "15%,25%"
- tapOn:
    point: "38%,25%"
- tapOn:
    point: "62%,25%"
- tapOn:
    point: "85%,25%"
- waitForAnimationToEnd

# Try selecting 5th image → toast expected
- tapOn:
    point: "15%,48%"
- waitForAnimationToEnd
# Tap Collage button (enabled now)
- tapOn: "Collage"
# Toast (best effort — do not fail test)
- runFlow:
    when:
      visible: "You can not select more than 4 images"
    commands:
      - waitForAnimationToEnd

# Try selecting 5th image → toast expected
- tapOn:
    point: "15%,48%"
- waitForAnimationToEnd

# Tap Collage button (enabled now)
- tapOn: "Collage"
- waitForAnimationToEnd

# ---------------- SELECT LAYOUT ----------------
- assertVisible: "Select Layout"
- waitForAnimationToEnd

# Swipe layouts (video shows slight scroll)
- swipe:
    start: "80%,40%"
    end: "30%,40%"
- waitForAnimationToEnd

# Select layout
- tapOn:
    point: "50%,38%"
- waitForAnimationToEnd

- tapOn: "Next"
- waitForAnimationToEnd

# ---------------- ADJUST LAYOUT ----------------
- assertVisible: "Adjust Layout"
- waitForAnimationToEnd

# Tap one collage image (center)
- tapOn:
    point: "50%,35%"
- waitForAnimationToEnd

# Replace option appears
- runFlow:
    when:
      visible: "Replace Image"
    commands:
      - tapOn: Replace Image
      - waitForAnimationToEnd

# Replace image picker opens (Select Items again)
- runFlow:
    when:
      visible: "Done"
    commands:
      # choose replacement image
      - tapOn:
         id: imageViewPhoto
         index: 1
      - waitForAnimationToEnd

      # confirm replacement (collage auto-updates)
      - tapOn: Done
      - waitForAnimationToEnd

# Back on Adjust Layout
- assertVisible: "Adjust Layout"
- waitForAnimationToEnd

# Save collage
- tapOn: "Save"
- waitForAnimationToEnd

# ---------------- ALL PHOTOS ----------------
- runFlow:
    when:
      visible: "All Photos"
    commands:
      - waitForAnimationToEnd

# Toast after save (best effort)
- runFlow:
    when:
      visible: "Collage image saved"
    commands:
      - waitForAnimationToEnd
- assertVisible: ${output.home.titleText}