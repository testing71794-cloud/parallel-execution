appId: com.kodaksmile
name: Flow1 Find Printer and Connect
---
- launchApp:
    clearState: true
- waitForAnimationToEnd

# Load elements
- runFlow: ../elements/loadElements.yaml
- runFlow: ../flows/I will do it later.yaml
- runFlow: ../flows/Agree Term and Condition.yaml
- runFlow: ../flows/Onboarding Welcome Screen.yaml
- runFlow: ../flows/Swipe to continue.yaml
- runFlow: ../flows/handleBluetoothPairing.yaml
- runFlow: ../flows/PrintMyFirstImage.yaml

# ✅ Find printer until available + connect (reliable)
- repeat:
    times: 6
    commands:
      - waitForAnimationToEnd

      - runFlow:
          when:
            visible: "Search Again"
          commands:
            - tapOn: "Search Again"
            - waitForAnimationToEnd

      - runFlow:
          when:
            visible: "Connect"
          commands:
            - tapOn: "Connect"
            - waitForAnimationToEnd
- runFlow: ../flows/handleBluetoothPairing.yaml
# Optional: First print onboarding
- runFlow:
    when:
      visible: "Print My First Picture"
    commands:
      - tapOn: "Print My First Picture"
      - waitForAnimationToEnd

# Fine-tune popup
- runFlow:
    when:
      visible: "Time to Fine-Tune"
    commands:
      - runFlow:
          when:
            visible: "Ok"
          commands:
            - tapOn: "Ok"
      - runFlow:
          when:
            visible: "OK"
          commands:
            - tapOn: "OK"
      - waitForAnimationToEnd

# Print
- runFlow:
    when:
      visible: "Print"
    commands:
      - assertVisible: "Print"
      - tapOn: "Print"
      - waitForAnimationToEnd
