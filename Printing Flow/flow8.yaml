appId: com.kodaksmile
name: Flow8 - Precut Print + Cooldown + Back
---
- launchApp:
    clearState: true
- waitForAnimationToEnd
- runFlow: ../elements/loadElements.yaml
- runFlow: ../flows/I will do it later.yaml
- runFlow: ../flows/Agree Term and Condition.yaml
- runFlow: ../flows/permissionsFlow.yaml
- runFlow: ../flows/Onboarding Welcome Screen.yaml
- runFlow:
    when:
      visible: "Swipe to continue"
    commands:
      - tapOn:
          point: "50%,50%"
      - waitForAnimationToEnd
      - swipe:
          start: "75%,55%"
          end: "15%,45%"
      - waitForAnimationToEnd
- runFlow: ../flows/onboardingSkip.yaml
- assertVisible: ${output.home.titleText}
- runFlow: ../flows/findAndConnectPrinter.yaml
- runFlow: ../flows/openAlbum.yaml
- runFlow: ../flows/selectSinglePhoto.yaml
- waitForAnimationToEnd
- runFlow:
    when:
      visible: ${output.editor.precutsTab}
    commands:
      - tapOn: ${output.editor.precutsTab}
      - waitForAnimationToEnd
      - tapOn:
          point: "20%,60%" # choose a precut option
      - waitForAnimationToEnd
# ----------------------------
# 1) Pre-Cut Stickers info popup
# ----------------------------
- runFlow:
    when:
      visible: "Pre-Cut Stickers"
    commands:
      - assertVisible: "Pre-Cut Stickers"

      # If the link text is present, tap only the link (NOT the whole sentence)
      - runFlow:
          when:
            visible: "Kodak 2x3 Pre-Cut Sticker Paper"
          commands:
            - tapOn: "Kodak 2x3 Pre-Cut Sticker Paper"
            - waitForAnimationToEnd
            - back
            - waitForAnimationToEnd

      # Close popup
      - tapOn: "OK"
      - waitForAnimationToEnd

# ----------------------------
# 2) CREATE PRE-CUT STICKERS (photo picker)
# ----------------------------
- assertVisible: |-
    CREATE PRE-CUT
     STICKERS

# Select 2 photos (best-effort by coordinates because IDs are unknown in the video)
# Adjust these points if your grid layout differs.
- tapOn:
    point: "12%,78%" # bottom-left thumbnail
- waitForAnimationToEnd
- tapOn:
    point: "50%,78%" # another thumbnail near the middle
- waitForAnimationToEnd

- assertVisible: "Next"
- tapOn: "Next"
- waitForAnimationToEnd

# ----------------------------
# 3) ADJUST PRE-CUT STICKERS screen
# ----------------------------
- assertVisible: |-
    ADJUST PRE-CUT
     STICKERS
- assertVisible: "Save"
- tapOn: "Save"
- waitForAnimationToEnd

# ----------------------------
# 4) Edit/Preview screen with Print button
# ----------------------------
- assertVisible: "Print"
- tapOn: "Print"
- waitForAnimationToEnd
- runFlow:
    when:
      visible: "Your print is ready!"
    commands:
      - tapOn: "1 Copy"
      - tapOn: "Print"
# Poll printer state
- repeat:
    times: 5
    commands:
      - runFlow:
          when:
            notVisible: "Print Successful"
          commands:
            - runFlow: ../flows/waitForPrinting.yaml
            - waitForAnimationToEnd
- doubleTapOn:
    point: 2%,5%
- runFlow:
    when:
      visible: "All Photos"
    commands:
      - assertVisible: "All Photos"
      - waitForAnimationToEnd
- tapOn:
    point: 1%,9%
